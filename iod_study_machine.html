<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IoD RDB Study Machine</title>
<style>
:root{color-scheme:light;--navy:#1a2744;--blue:#0057a8;--gold:#c8a94a;--light:#f4f6fb;--green:#1a7a4a;--red:#c0392b;--orange:#e67e22;--r:10px;--sh:0 2px 12px rgba(0,0,0,.1)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI",Arial,sans-serif;background:var(--light);color:#222;min-height:100vh}
#app{max-width:820px;margin:0 auto;padding:16px}
.hdr{background:var(--navy);color:#fff;border-radius:var(--r);padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.hdr-title{font-size:1rem;font-weight:700;line-height:1.3}
.hdr-sub{font-size:.72rem;opacity:.7;margin-top:2px}
.iod-badge{background:var(--gold);color:var(--navy);font-weight:800;font-size:.82rem;padding:4px 10px;border-radius:6px;white-space:nowrap}
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.mode-card{background:#fff;border-radius:var(--r);padding:22px;box-shadow:var(--sh);cursor:pointer;border:2px solid transparent;transition:all .2s;text-align:center}
.mode-card:hover{border-color:var(--blue);transform:translateY(-2px)}
.mode-card .icon{font-size:2rem;margin-bottom:8px}
.mode-card h2{font-size:1rem;color:var(--navy);margin-bottom:5px}
.mode-card p{font-size:.8rem;color:#666;line-height:1.5}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.stat-box{background:#fff;border-radius:var(--r);padding:12px;text-align:center;box-shadow:var(--sh)}
.stat-box .val{font-size:1.4rem;font-weight:800;color:var(--blue)}
.stat-box .lbl{font-size:.7rem;color:#888;margin-top:2px}
.info-box{background:#fff;border-radius:var(--r);padding:12px 14px;font-size:.8rem;color:#555;line-height:1.7;box-shadow:var(--sh)}
.btn{padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-size:.84rem;font-weight:600;transition:all .15s}
.btn:disabled{opacity:.4;cursor:default}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover:not(:disabled){background:#0046a0}
.btn-secondary{background:#e8edf5;color:var(--navy)}
.btn-secondary:hover:not(:disabled){background:#d0d9ee}
.btn-success{background:var(--green);color:#fff}
.btn-success:hover:not(:disabled){background:#156b3e}
.btn-danger{background:var(--red);color:#fff}
.nav-bar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.spacer{flex:1}
.prog-wrap{height:5px;background:#e0e0e0;border-radius:3px;margin-bottom:10px}
.prog-bar{height:100%;background:var(--blue);border-radius:3px;transition:width .3s}
.q-grid{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.q-dot{width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;cursor:pointer;border:2px solid #ccc;background:#fff;color:#555;transition:all .15s}
.q-dot.cur{border-color:var(--blue);color:var(--blue);background:#e8f0fe}
.q-dot.ans{background:var(--navy);border-color:var(--navy);color:#fff}
.q-dot.ok{background:var(--green);border-color:var(--green);color:#fff}
.q-dot.bad{background:var(--red);border-color:var(--red);color:#fff}
.q-card{background:#fff;border-radius:var(--r);padding:18px;box-shadow:var(--sh);margin-bottom:12px}
.q-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.badge{display:inline-block;font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.2px}
.b-sec{background:#e8edf5;color:var(--navy)}
.b-K{background:#e3f2fd;color:#1565c0}
.b-U{background:#e8f5e9;color:#2e7d32}
.b-Ap{background:#fff3e0;color:#e65100}
.b-An{background:#fce4ec;color:#c62828}
.b-1m{background:#f3e5f5;color:#6a1b9a}
.b-2m{background:#fff8e1;color:#7a5c00}
.q-num{font-size:.75rem;color:#aaa;margin-left:auto}
.q-scenario{font-style:italic;color:#555;font-size:.86rem;line-height:1.6;margin-bottom:10px;padding:9px 12px;background:#f8f9fc;border-left:3px solid var(--blue);border-radius:0 6px 6px 0}
.q-text{font-size:.93rem;font-weight:600;color:var(--navy);line-height:1.6;margin-bottom:12px}
.options{display:flex;flex-direction:column;gap:7px}
.opt{display:flex;align-items:flex-start;gap:9px;padding:10px 13px;border:2px solid #e0e0e0;border-radius:8px;cursor:pointer;transition:all .15s;font-size:.86rem;line-height:1.5}
.opt:hover:not(.dis){border-color:var(--blue);background:#f0f6ff}
.opt.sel{border-color:var(--blue);background:#e8f0fe}
.opt.cor{border-color:var(--green);background:#e8f5ee}
.opt.wrg{border-color:var(--red);background:#fdecea}
.opt.shw{border-color:var(--green);background:#e8f5ee;opacity:.75}
.opt.dis{cursor:default}
.opt-l{font-weight:800;font-size:.88rem;color:var(--navy);min-width:16px}
.opt-t{flex:1}
.opt-i{min-width:16px;font-size:.95rem}
.ex-box{margin-top:12px;padding:12px;background:#f8f9fc;border-radius:8px;font-size:.81rem;line-height:1.6;border:1px solid #e0e6f0}
.ex-hdr{font-weight:700;color:var(--navy);margin-bottom:7px;font-size:.83rem}
.ex-item{margin-bottom:6px}
.ex-c .ex-tag{color:var(--green);font-weight:700}
.ex-w .ex-tag{color:var(--red);font-weight:700}
.ex-ref{font-size:.74rem;color:#999;margin-top:6px}
.timer-box{display:flex;align-items:center;gap:6px;background:var(--navy);color:#fff;border-radius:7px;padding:6px 12px;font-size:.85rem}
.timer-box.warn{background:var(--orange)}
.timer-box.dang{background:var(--red);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.t-dig{font-size:1.1rem;font-weight:800;font-variant-numeric:tabular-nums}
.hero{background:linear-gradient(135deg,var(--navy),#2a4a8a);color:#fff;border-radius:var(--r);padding:26px;text-align:center;margin-bottom:14px}
.hero .sc{font-size:2.8rem;font-weight:900;margin-bottom:5px}
.hero .vd{font-size:1.1rem;font-weight:700;padding:5px 18px;border-radius:20px;display:inline-block;margin-bottom:6px}
.vd-p{background:var(--green)}
.vd-f{background:var(--red)}
.hero .hs{font-size:.82rem;opacity:.8}
.rq{background:#fff;border-radius:var(--r);padding:14px;margin-bottom:10px;box-shadow:var(--sh);border-left:4px solid #ccc}
.rq.ok{border-left-color:var(--green)}
.rq.bad{border-left-color:var(--red)}
.rq.skip{border-left-color:var(--orange)}
.rq-hd{display:flex;gap:6px;align-items:center;margin-bottom:7px;font-size:.78rem;flex-wrap:wrap}
@media(max-width:540px){.home-grid{grid-template-columns:1fr}.stats-row{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div><div class="hdr-title">IoD Role of the Director &amp; the Board</div><div class="hdr-sub">Chartered Director Programme &mdash; Study Machine</div></div>
    <div class="iod-badge">IoD&nbsp;RDB</div>
  </div>
  <div id="screen"></div>
</div>
<script>
const BANK=[{"id": "W1", "section": "1.4", "level": "Understanding", "marks": 1, "scenario": "Some countries adopt mandatory, rules-based approaches to corporate governance with a strict enforcement regime, while other countries adopt a more principles-based approach.", "question": "Which of the following statements is MOST accurate when considering these two approaches?", "options": ["A rules-based approach is superior as this approach specifically legislates on every aspect of corporate governance, which ensures superior governance standards and behaviour.", "A principles-based approach has the advantage that the emphasis on adhering to the spirit of the rules provides some flexibility and helps to avoid a 'tick box' mentality.", "As the rules-based approach often duplicates other legislative requirements of directors, this approach gives more support than a principles-based approach.", "As a principles-based approach is not mandatory, its effectiveness is limited, and it cannot promote governance standards and behaviour as much as mandatory laws can."], "answer": 1, "explanations": ["Incorrect — it is impossible to legislate against every eventuality and so behaviour can be compromised.", "Correct — a rules-based approach allows anything to happen unless specifically legislated against, which can lead to a tick-box mentality.", "Incorrect — this leads to excessive corporate resources being devoted to compliance and provides no additional comfort.", "Incorrect — a principles-based approach will often lead to superior performance and behaviour, exceeding mandatory requirements."], "ref": "Section 1.4"}, {"id": "W2", "section": "1.3", "level": "Application", "marks": 1, "scenario": null, "question": "Which of the following is an example / are examples of the principal tenets of corporate governance?\n\n1. Timely disclosure of adequate information about financial performance to shareholders and other stakeholders.\n2. Acting honestly in business dealings and in the exercise of all responsibilities as a director.\n3. Ensuring that profits are being generated by the organisation.", "options": ["1 only", "1 and 2 only", "2 and 3 only", "1, 2 and 3"], "answer": 1, "explanations": ["Incorrect — this does not include statement 2.", "Correct — statement 1 is an example of transparency; statement 2 is an example of integrity. Statement 3 is not a principal tenet.", "Incorrect — this does not include statement 1, and statement 3 is not a principal tenet.", "Incorrect — statement 3 (ensuring profits) is not a principal tenet of corporate governance."], "ref": "Section 1.3"}, {"id": "E1", "section": "1.5", "level": "Understanding", "marks": 1, "scenario": null, "question": "Which of the following is a characteristic of a company operating under a blockholder model?", "options": ["Management incentives are generally determined by market forces.", "There is strong minority shareholder protection.", "Management power is strong.", "Board is close to controlling owner."], "answer": 3, "explanations": ["Incorrect — in a blockholder model, management incentives tend to be directly supervised by a controlling owner.", "Incorrect — in a blockholder model, minority shareholder protection is generally weak.", "Incorrect — in a blockholder model, management power is weak in deference to the controlling owner.", "Correct — in a blockholder model there is a controlling ownership, and the board is closely aligned with that owner."], "ref": "Section 1.5.1"}, {"id": "E2", "section": "1.3", "level": "Application", "marks": 1, "scenario": "John is the chair and CEO of a building company. He is very charismatic but likes to have his own way and tends to drive through his recommendations at board meetings. He has an extensive property portfolio and regularly uses the employees of the company to undertake personal work for him during company time and at the company's expense. Erica, one of the other directors, has expressed concern but has been comforted by Bill, another director, who assured her that she is only responsible for her own actions, not John's.", "question": "Which of the following statements is correct in relation to board-level integrity?", "options": ["The company's assets and resources should not be used by directors to benefit themselves or anyone else other than the company.", "Members of a board are only responsible for the decisions that they vote for.", "A director should use independent judgement, which means they cannot take external advice.", "Directors should consider the interests of stakeholders beyond the company's shareholders."], "answer": 0, "explanations": ["Correct — this is a direct example of board integrity: company assets must not be used for personal benefit.", "Incorrect — directors have collective, not only individual, responsibility for board decisions.", "Incorrect — directors can take external advice and then exercise independent judgement; the two are not mutually exclusive.", "Incorrect — this is an example of accountability rather than integrity per se."], "ref": "Section 1.3"}, {"id": "G1", "section": "1.1", "level": "Knowledge", "marks": 1, "scenario": null, "question": "The OECD's G20/OECD Principles of Corporate Governance are set out under how many headings?", "options": ["Four headings", "Five headings", "Six headings", "Eight headings"], "answer": 2, "explanations": ["Incorrect — the Principles are set out under six, not four, headings.", "Incorrect — the Principles are set out under six, not five, headings.", "Correct — the 2023 OECD Principles are structured under six headings covering the governance framework, shareholder rights, institutional investors, disclosure, board responsibilities, and sustainability.", "Incorrect — there are six, not eight, headings."], "ref": "Section 1.1.2"}, {"id": "G2", "section": "1.5", "level": "Knowledge", "marks": 1, "scenario": null, "question": "The Salomon v Salomon & Co Ltd [1897] case established a fundamental principle of company law. Which of the following BEST describes that principle?", "options": ["A company can be held responsible for its directors' personal debts.", "A company is a separate legal entity, distinct from its shareholders and directors.", "Shareholders can be held personally liable for company debts up to the value of their original investment.", "Directors have unlimited personal liability for all company debts."], "answer": 1, "explanations": ["Incorrect — the principle works in the opposite direction: the company's debts are its own, not those of its directors.", "Correct — Salomon established that a company has its own separate legal personality, meaning it is distinct from its shareholders and directors, and its debts are its own.", "Incorrect — limited liability means shareholders' exposure is limited to any unpaid amount on their shares, not the full investment value.", "Incorrect — directors have potential personal liability only in specific circumstances (e.g. wrongful trading), not for all debts generally."], "ref": "Section 2.2.1"}, {"id": "W3", "section": "2.1", "level": "Knowledge", "marks": 1, "scenario": null, "question": "Which of the following is a feature of a civil law system?", "options": ["There is generally a written constitution and specific statutes.", "Judicial decisions are binding.", "Statutes are interpreted by court cases.", "Courts can override the constitution."], "answer": 0, "explanations": ["Correct — civil law systems are codified, based on a written constitution and specific statutes.", "Incorrect — binding judicial precedent is a feature of common law systems.", "Incorrect — statutes being interpreted by court cases characterises common law systems.", "Incorrect — in any country, constitutional law takes primacy over the judiciary."], "ref": "Section 2.1.2"}, {"id": "W4", "section": "2.2", "level": "Application", "marks": 1, "scenario": "Harry bought 100 shares in Company X, a private limited company, paying £3.30 per share. These are fully paid up. The nominal value of the shares is £2 per share. The company has recently got into trading difficulties, and Harry is concerned that he may be held liable for some of the company's debts if the company becomes insolvent.", "question": "Which of the following is appropriate in relation to Harry's exposure to debt?", "options": ["He will be liable for his share of the debt, which will be calculated based on his proportionate shareholding.", "He will be liable for the debts of the company up to the amount of the nominal value of the shares, which is £200.", "He will be liable for the debts of the company up to the amount of the value of the shares, including the premium, which is £330.", "He will have no further liability to the company."], "answer": 3, "explanations": ["Incorrect — limited liability means Harry is not personally liable for the company's debts at all.", "Incorrect — nominal value is relevant to partly-paid shares; as Harry's shares are fully paid, his liability is nil.", "Incorrect — market or purchase value is irrelevant; fully-paid shares mean no further liability.", "Correct — Harry's shares are fully paid up. The privilege of limited liability means he could lose his investment but faces no further personal liability for company debts."], "ref": "Section 2.2.1"}, {"id": "W5", "section": "2.3", "level": "Understanding", "marks": 1, "scenario": null, "question": "Which of the following statements are BEST in relation to the disclosure of related party transactions?\n\n1. It is important for the market to know whether a company is being run with due regard to all its stakeholders.\n2. All related party transactions need to be disclosed by the board and the company.\n3. Related parties can include persons who have significant influence over the company.\n4. Related parties can include subsidiary companies or other entities controlled by significant shareholders.", "options": ["1 and 3 only", "1 and 4 only", "1, 3 and 4 only", "2 and 3 only"], "answer": 2, "explanations": ["Incorrect — this excludes statement 4, which is also correct.", "Incorrect — this excludes statement 3, which is also correct.", "Correct — statements 1, 3 and 4 are correct. Statement 2 is incorrect — only material (not all) transactions need to be disclosed.", "Incorrect — this excludes statements 1 and 4, and statement 2 is incorrect."], "ref": "Section 2.3.2"}, {"id": "E3", "section": "2.1", "level": "Knowledge", "marks": 1, "scenario": null, "question": "Which of the following statements describes why it is important to understand the legal regime of the jurisdiction in which your organisation operates?", "options": ["As common law systems are more prescriptive than civil law systems, boards and organisations will need to articulate their own processes, codes and contracts.", "In civil law jurisdictions, there is a preference for codes and non-mandatory frameworks, which means boards must consider and apply these on a case-by-case basis.", "In common law jurisdictions, the law is more likely to imply certain terms, and the mandatory rules will require the organisation to comply with more rigid terms.", "Most boards operate in a multi-faceted environment whereby mandatory laws must be considered in a wider context and in conjunction with codes, regulations and private contracts."], "answer": 3, "explanations": ["Incorrect — common law systems are less, not more, prescriptive than civil law systems.", "Incorrect — the preference for codes and non-mandatory frameworks is a feature of common law systems, not civil law systems.", "Incorrect — implied terms and rigid mandatory compliance characterise civil law jurisdictions, not common law.", "Correct — most boards operate in environments where both legal regimes are present; mandatory laws must be considered alongside codes, regulations and private contracts."], "ref": "Section 2.1.2"}, {"id": "E4", "section": "2.2", "level": "Application", "marks": 1, "scenario": "Company X, a private limited company, borrowed £1 million to enhance their manufacturing capability. As the company had significant amounts of existing debt, the CEO and CFO of the company offered personal guarantees to the bank to obtain the loan. Company X has recently become insolvent with debts of £5m.", "question": "Which one of the following is appropriate in relation to the debt exposure of the CEO and CFO?", "options": ["There is no liability as Company X is a private limited company.", "The CEO and CFO will each be liable for half of the debts of the company including the loan.", "Only the CEO and CFO will together be personally liable for £1m.", "Only the CEO and CFO will together be personally liable for £5m."], "answer": 2, "explanations": ["Incorrect — a personal guarantee overrides the limited liability protection for the specific guaranteed amount.", "Incorrect — the personal guarantee covers the £1m loan specifically, not the full £5m company debt, and need not be split equally.", "Correct — the personal guarantee covers the £1m loan. The CEO and CFO are personally liable for that amount; the remaining debt is not covered by their guarantee.", "Incorrect — the personal guarantee is limited to the £1m loan, not the full £5m insolvency debt."], "ref": "Section 2.1.1"}, {"id": "E5", "section": "2.4", "level": "Understanding", "marks": 1, "scenario": null, "question": "Which of the following is a governance policy?", "options": ["Health and safety", "Formal schedules for matters reserved for the decision of the board", "Board member and senior appointment remuneration", "Strategy and business planning cycle"], "answer": 2, "explanations": ["Incorrect — health and safety is a monitoring policy.", "Incorrect — formal schedules for reserved matters are a delegation policy.", "Correct — board member and senior appointment remuneration policies are governance policies, as they relate to how the organisation is governed.", "Incorrect — strategy and business planning cycle is a long-range planning policy."], "ref": "Section 2.4"}, {"id": "G3", "section": "2.2", "level": "Knowledge", "marks": 1, "scenario": null, "question": "The principle of incorporation — establishing a company as a separate legal entity — was first brought into effect in the UK through which piece of legislation?", "options": ["The Limited Liability Act 1855", "The Joint Stock Companies Act 1844", "The Companies Act 1862", "The Companies Act 2006"], "answer": 1, "explanations": ["Incorrect — the Limited Liability Act 1855 introduced limited liability, but the principle of incorporation predates it.", "Correct — the Joint Stock Companies Act 1844 first established the principle that a company could be incorporated as a legal entity separate from its owners.", "Incorrect — the Companies Act 1862 consolidated earlier legislation but was not the first to establish the separate legal entity principle.", "Incorrect — the Companies Act 2006 is the current primary company law statute in the UK but was not the first."], "ref": "Section 2.2"}, {"id": "G4", "section": "2.3", "level": "Understanding", "marks": 1, "scenario": null, "question": "Which of the following BEST describes the primary purpose of a company's articles of association?", "options": ["To set out the company's annual financial reporting obligations to shareholders.", "To regulate the internal affairs of the company, including board powers, shareholder rights and decision-making procedures.", "To provide a public record of the company's registered office and directors.", "To establish the company's tax obligations and annual filing requirements."], "answer": 1, "explanations": ["Incorrect — annual financial reporting obligations are governed by company law and accounting standards, not the articles.", "Correct — the articles of association regulate the internal affairs of the company, defining how it is governed and the relationship between the board and shareholders.", "Incorrect — information about registered office and directors is filed with Companies House separately.", "Incorrect — tax obligations are governed by tax legislation, not the articles of association."], "ref": "Section 2.3.1"}, {"id": "W6", "section": "3.2", "level": "Analysis", "marks": 2, "scenario": "Company X is a company with large fixed asset requirements. The governing documents note that the CEO, CFO and one other director must approve all contracts over £100,000 in value. The company is experiencing much growth in sales, and, following considerable discussion at recent board meetings, it was agreed that significant capital expenditure is required.\n\nWhile the discussions took place, the marketing director was offered the necessary capital items at a bargain price of £120,000 from Company Y on condition that the contract to buy was signed immediately. As the marketing director could not get in contact with either the CEO or CFO, who were both on vacation, he individually signed the contract to purchase and authorised a deposit of £20,000 to be paid to Company Y. Before the delivery, Company Y became insolvent, and the deposit is subsequently not recoverable.", "question": "Which of the following is the BEST course of action to be taken by the board in relation to the scenario above?", "options": ["As it has been agreed by the board to purchase such capital items, the lost deposit will simply be deemed to be an expense of Company X.", "As the marketing director has acted outside of his authority, he will be personally liable to recompense the company for the lost deposit.", "Whilst the marketing director has acted outside of his authority, the company will not be able to pursue the marketing director for the lost deposit as the loss is less than £100,000.", "As the marketing director tried to contact both the CEO and CFO, who should have been available even when on vacation, he cannot be held liable for the loss."], "answer": 1, "explanations": ["Incorrect — the marketing director did not have the authority to enter into this contract; it did not follow the company's governing rules.", "Correct — if a director acts outside their authority, they are personally liable for any resulting loss. The marketing director had no authority to sign contracts over £100,000 alone.", "Incorrect — personal liability applies irrespective of the size of the loss when a director acts outside their authority.", "Incorrect — the contract should not have been signed regardless; the unavailability of the CEO and CFO is not a valid justification."], "ref": "Section 3.2.3"}, {"id": "W7", "section": "3.2", "level": "Understanding", "marks": 1, "scenario": "PRB, a printing business with a turnover of £5 million, profits of around £1 million and 20 employees, is owned by its three board members. Two board members, Mary and Jim, are employed full-time elsewhere and leave the running of the business to Joe. Joe has little regard for financial management or internal audit, justifying this as PRB has grown considerably under his leadership.", "question": "Which ONE of the following statements is correct in relation to PRB?", "options": ["As revenue and profitability have increased, PRB is clearly operating effectively, so Mary and Jim's approach is satisfactory.", "While PRB is insufficiently large to establish its own internal audit function, Mary, Jim and Joe must appoint an external provider to carry out a review of internal controls.", "Mary, Jim and Joe must set up an audit committee that will make recommendations for improvements to the internal control systems.", "In the absence of an internal audit function, Mary, Jim and Joe need to apply other monitoring processes to ensure that the system of internal control is functioning as intended."], "answer": 3, "explanations": ["Incorrect — increasing profitability does not mean the internal control obligations of directors have been satisfied.", "Incorrect — as a private company there is no requirement to appoint an external provider to review internal controls.", "Incorrect — as a private company there is no requirement to set up an audit committee.", "Correct — all board members have a statutory duty to understand what is happening in the business. In the absence of internal audit, other monitoring processes must be applied."], "ref": "Section 3.3.1"}, {"id": "W8", "section": "3.3", "level": "Application", "marks": 1, "scenario": "Joe is the board member responsible for health and safety in Company X and has responsibility for signing off and keeping current the maintenance contracts required by statute for the machinery in the manufacturing plant. Some contracts have lapsed as Joe has been busy. When an internal audit review was conducted, Joe created misleading paperwork implying all contracts were up to date. There was subsequently a fatal accident in the manufacturing plant when a belt broke on a machine without an up-to-date contract.", "question": "Which of the following statements BEST describe this situation?\n\n1. This is likely to be a criminal offence of manslaughter.\n2. There is a link between Joe's actions and a reasonably foreseeable event.\n3. Joe is the only board member who would be held responsible for this accident.\n4. The board are all culpable for this action as they all have to collectively ensure that paperwork is correct.", "options": ["1 and 2 only", "1, 2 and 3 only", "3 and 4 only", "2 and 4 only"], "answer": 1, "explanations": ["Incorrect — this excludes statement 3 (Joe is the responsible director) which is also correct.", "Correct — keeping maintenance contracts up to date was a statutory requirement; its breach causing death constitutes manslaughter (1). There is a direct causal link (2). Joe, as the responsible director who created fictitious paperwork, bears primary responsibility (3). Statement 4 is incorrect because other board members were deceived.", "Incorrect — statement 4 (collective board culpability) is incorrect as others were deceived by fictitious paperwork.", "Incorrect — this excludes statement 1 (criminal manslaughter) and statement 3."], "ref": "Section 3.3"}, {"id": "E6", "section": "3.2", "level": "Analysis", "marks": 2, "scenario": "The board of Company X had been considering exporting their products to Country A, a developing country. Following significant analysis of the potential market in Country A, which looked very lucrative, the decision was taken to start exporting. The board was keen to be the first into the market, so no risk analysis was undertaken about the Country as the directors thought that this would take too long.\n\nTwo months after the first large shipment of products to Country A, there was a military coup. The rate of inflation has now risen to over 2000 percent, and the currency has become very unstable. It is highly unlikely that Company X will receive any payment for the shipment, which could have a material impact on the finances of the company.", "question": "Which of the following is the BEST action to be taken against the board with reference to the exports to Country A?", "options": ["As the board could not have foreseen the military coup, the decision to export should simply be regarded as an unfortunate business decision, and no further action should be taken.", "As this exporting market looked very lucrative, it was worth the directors taking the risk to enter into this market so no further action should be taken.", "It is likely that the directors would be seen to be failing in their duties to the company for not undertaking a risk analysis of Country A, considering the risk appetite of the company.", "The directors acted in good faith, trying to be first in this lucrative market. While this is the action that any reasonable director would have taken in the circumstances, the directors should still be challenged on the financial consequences."], "answer": 2, "explanations": ["Incorrect — if an appropriate analysis had been undertaken, the potential of a coup in a developing country would likely have been foreseen.", "Incorrect — the directors did not exercise due care and attention; they were not appropriately informed about country risk.", "Correct — failing to undertake a risk analysis of a developing country constitutes a failure of adequate due diligence; directors have a duty to exercise reasonable care, skill and diligence.", "Incorrect — this is not what a reasonable director would do. A reasonable director would have undertaken an appropriate risk analysis before making such a material commitment."], "ref": "Section 3.2.1"}, {"id": "E7", "section": "3.2", "level": "Understanding", "marks": 1, "scenario": null, "question": "Which of the following statements is the BEST in relation to the number of board positions across multiple companies that can be held by any one person?", "options": ["As executive board members are full-time employees of their company, they can only hold one directorship.", "There is no limit on the number of non-executive positions an individual can have.", "In order to ensure independence and manage time and other conflicts, it is best to limit the number of board positions an individual can have.", "It is advantageous for non-executive directors to serve on as many boards as possible since this exposure to a variety of different companies will increase the value they can add."], "answer": 2, "explanations": ["Incorrect — executive board members can hold other appointments, such as a non-executive director role elsewhere.", "Incorrect — in some jurisdictions there are legal limits on NED positions, and there are also practical factors such as time commitment and conflicts of interest.", "Correct — this is consistent with the G20/OECD recommendation for ensuring independence and effectiveness.", "Incorrect — serving on too many boards challenges independence and creates issues around having sufficient time to devote to each directorship."], "ref": "Section 3.2.1"}, {"id": "E8", "section": "3.3", "level": "Application", "marks": 1, "scenario": "Under the articles of Company X, any one of its executive directors can authorise any contract worth up to £50,000. Any contract that exceeds this amount requires the authorisation of two executive directors.\n\nGeorge, the sales director, was offered an excellent marketing campaign by a marketing agency. The contract was heavily discounted from £100,000 down to £80,000 on condition that the contract was authorised immediately. Unfortunately, George was unable to locate any of the other directors to authorise the contract, and he therefore authorised the contract on his own.", "question": "What action/s is/are open to Company X?\n\n1. Ratify the action of George in a general meeting.\n2. Change the articles through a board resolution.\n3. Seek restitution for any losses incurred by fulfilling the contract from George personally.\n4. Dismiss George for breach of his authority.", "options": ["1, 2 and 3 only", "2, 3 and 4 only", "1, 2 and 4 only", "1, 3 and 4 only"], "answer": 3, "explanations": ["Incorrect — this excludes statement 4 but incorrectly includes statement 2 (articles cannot be changed by board resolution).", "Incorrect — this excludes statement 1 (ratification at a GM) but incorrectly includes statement 2.", "Incorrect — this incorrectly includes statement 2; only a special resolution of shareholders can change the articles.", "Correct — the company can ratify George's action at a GM (1), seek restitution from George personally for acting outside his authority (3), and dismiss him for breach of authority (4). The articles cannot be changed by a board resolution (2 is wrong)."], "ref": "Section 3.3.3"}, {"id": "G5", "section": "3.1", "level": "Knowledge", "marks": 1, "scenario": null, "question": "Which of the following BEST defines a 'shadow director'?", "options": ["A director formally appointed but not yet registered with the relevant authority.", "A non-executive director who attends meetings as an observer without voting rights.", "A person whose instructions the board is accustomed to act upon, even though they have not been formally appointed as a director.", "An alternate director appointed to act on behalf of an appointed director during their absence."], "answer": 2, "explanations": ["Incorrect — a director who is formally appointed but not yet registered is a de jure director.", "Incorrect — a board observer is not the same as a shadow director; shadow directors exercise actual influence over board decisions.", "Correct — a shadow director is someone not formally appointed but whose instructions the board habitually follows. They can incur the same duties and liabilities as formally appointed directors.", "Incorrect — an alternate director is a separate, recognised category formally provided for in governing documents."], "ref": "Section 3.1"}, {"id": "G6", "section": "3.2", "level": "Application", "marks": 1, "scenario": null, "question": "Under the UK Companies Act 2006, which of the following is one of the seven key directors' duties?", "options": ["To ensure the company achieves a profit in each financial year.", "To act in accordance with the company's constitution and only exercise powers for the purposes for which they are conferred.", "To attend every board meeting and vote on all resolutions without abstention.", "To personally guarantee the debts of the company in periods of financial difficulty."], "answer": 1, "explanations": ["Incorrect — directors have no duty to guarantee profitability; this is a management aspiration, not a statutory duty.", "Correct — one of the seven statutory duties (s.171 Companies Act 2006) requires directors to act in accordance with the company's constitution and only exercise powers for proper purposes.", "Incorrect — while attendance and participation are expected, missing meetings or abstaining is not automatically a breach of statutory duty.", "Incorrect — directors have no general duty to personally guarantee company debts; guarantees are voluntary contractual arrangements."], "ref": "Section 3.2.1"}, {"id": "G7", "section": "3.3", "level": "Application", "marks": 2, "scenario": "Alison is a director of RetailCo Ltd, which has been experiencing declining sales for 18 months. At the last board meeting, Alison's own financial projections showed that unless a major new contract was secured within six weeks, the company would be unable to pay its debts. Despite this, the board resolved to continue trading and placed significant new stock orders on credit. The contract failed to materialise. RetailCo entered insolvent liquidation three months later.", "question": "Which of the following BEST describes the directors' potential liability?", "options": ["The directors have no liability as they acted in good faith and genuinely hoped the contract would materialise.", "The directors may face personal liability for wrongful trading, as they continued to incur debts when they knew (or ought to have known) there was no reasonable prospect of avoiding insolvent liquidation.", "Only Alison is personally liable, as she prepared the projections that demonstrated the risk.", "The directors are fully protected from personal liability because RetailCo is a limited company."], "answer": 1, "explanations": ["Incorrect — good faith alone is insufficient; the legal test for wrongful trading is objective, not subjective.", "Correct — wrongful trading applies when directors continue to trade and incur debts knowing (or having reason to know) there is no reasonable prospect of avoiding insolvent liquidation.", "Incorrect — all directors who participated in the decision to continue trading share potential liability.", "Incorrect — limited liability protects shareholders, not directors who engage in wrongful trading."], "ref": "Section 3.3.1"}, {"id": "G8", "section": "3.4", "level": "Knowledge", "marks": 1, "scenario": null, "question": "Which of the following BEST describes the PRIMARY function of a non-executive director (NED)?", "options": ["To manage the day-to-day operations of the organisation.", "To provide specialist technical advice to the executive team.", "To provide independent oversight, scrutiny and constructive challenge to the executive directors and the board.", "To represent the interests of employees at board level."], "answer": 2, "explanations": ["Incorrect — day-to-day operations are the responsibility of executive management.", "Incorrect — while NEDs may bring expertise, their primary function is independent oversight, not technical consultancy.", "Correct — the core function of a NED is to provide independent judgment and challenge, contributing to the effective governance of the organisation without being involved in day-to-day management.", "Incorrect — employee representation is a feature of co-determination systems (e.g. in Germany) but is not the primary function of a NED in general."], "ref": "Section 3.4.4"}, {"id": "W9", "section": "4.1", "level": "Understanding", "marks": 1, "scenario": null, "question": "Which of the following activities are MORE likely to be board authorities as opposed to managerial authorities?", "options": ["Monitor the overall progress of strategic implementation.", "Develop the strategy implementation plan.", "Allocate the company resources in the most effective and efficient manner.", "Embed the culture and values throughout the organisation."], "answer": 0, "explanations": ["Correct — monitoring overall strategic progress is a board authority; it is part of the board's oversight role.", "Incorrect — developing an implementation plan is a management activity.", "Incorrect — resource allocation rests with management.", "Incorrect — while the board sets the tone at the top, the day-to-day task of embedding culture and values lies with management."], "ref": "Section 4.1.2"}, {"id": "W10", "section": "4.2", "level": "Analysis", "marks": 2, "scenario": "The chair and CEO of Company X, a private limited company, is a very charismatic and persuasive individual who set up the company with two university friends. The company has enjoyed considerable success over the years and, as the board has expanded in size, more university friends from different degree disciplines have been appointed as both executive and non-executive directors.", "question": "Which of the following statements is MOST appropriate in relation to the board's decision-making?", "options": ["This is a well-balanced board as, collectively, the members have the appropriate skills. Also, as all the members are friends from university, they are likely to work well together as a team.", "The chair and CEO cannot be the same person, and so one of the other board members should be appointed to one of these roles.", "As the board members were all friends at university, they are likely to have formed strong social bonds of loyalty, which increases the risk of groupthink.", "As the board members were all university friends, there is a conflict of interest, which would need to be declared by each director at every board meeting."], "answer": 2, "explanations": ["Incorrect — while the board may be balanced in skills, it is not well-balanced in terms of independent thinking; shared backgrounds increase groupthink risk.", "Incorrect — there is no legal requirement to separate the chair and CEO roles.", "Correct — being friends from the same university means they are less likely to challenge each other or their charismatic leader, increasing the risk of in-group bias and groupthink.", "Incorrect — being university friends does not in itself constitute a conflict of interest."], "ref": "Section 4.2.2"}, {"id": "W11", "section": "4.3", "level": "Analysis", "marks": 2, "scenario": "The board of Company TBC is struggling to find sufficient time during board meetings to discuss all pertinent business, and one member has suggested that some matters could be delegated to a committee. As there is very little financial knowledge on the board, it has been suggested that an audit committee should be set up to take responsibility for discussing audit and risk matters.", "question": "Which of the following statements is appropriate in relation to setting up an audit and risk committee?", "options": ["As risk is such a fundamental aspect of the board's deliberations, this is an area that cannot be delegated.", "As the board has full responsibility for decision-making, it is inappropriate to delegate any responsibilities to a sub-group.", "As there is very little financial knowledge on the board, it is appropriate to delegate decision-making related to audit to an audit committee, although the board will need to retain responsibility for risk issues.", "As the board will remain responsible for the actions of this sub-committee and will retain full decision-making powers, this is a sensible approach that will free up some board time."], "answer": 3, "explanations": ["Incorrect — there is no limit on what can be delegated to committees; the board can delegate consideration of any matter.", "Incorrect — committees are often formed to enable matters to be discussed in depth; the board retains full responsibility.", "Incorrect — the board retains full decision-making powers; a committee cannot be given final decision-making authority.", "Correct — the delegated committee is a sub-group of the main board. The board retains full responsibility and decision-making power; the committee handles detailed deliberation."], "ref": "Section 4.3.1"}, {"id": "W12", "section": "4.2", "level": "Understanding", "marks": 1, "scenario": null, "question": "What potential advantage does a two-tier board have over a unitary board?", "options": ["Non-executive directors have a closer and more informed observation of executives.", "Non-executive directors can be more objective in their oversight of management.", "Executive directors in effect monitor and supervise their own performance.", "As each board is smaller, this enhances decision-making."], "answer": 1, "explanations": ["Incorrect — this is actually an advantage of the unitary board, where NEDs interact closely with executives.", "Correct — in a two-tier board, the supervisory board (NEDs) is entirely separate from the management board (executives), allowing greater objectivity in oversight.", "Incorrect — this is a disadvantage of an all-executive board, not a feature of the two-tier model.", "Incorrect — there is no evidence that two smaller boards make better decisions than one larger unitary board."], "ref": "Section 4.2.1"}, {"id": "E9", "section": "4.1", "level": "Understanding", "marks": 1, "scenario": null, "question": "Which ONE of the following statements accurately describes part of the board's role in setting the vision, values and strategy of the organisation?", "options": ["It is the responsibility of senior management to set the values of the organisation, but the board should monitor whether or not the values are being adhered to.", "The board needs to consider whether the strategy of the organisation is aligned with the vision and values of the organisation.", "It is the responsibility of the board to develop the vision of the organisation, but it is senior management's responsibility to articulate the purpose.", "Once the board has agreed on the organisational values, its responsibility is restricted to ensuring that senior management adopts these values in their behaviour."], "answer": 1, "explanations": ["Incorrect — setting the values is a responsibility of the board, not management.", "Correct — the board must ensure strategy is consistent with the organisation's vision and values.", "Incorrect — the board also needs to develop (or at least approve) the purpose or mission of the organisation.", "Incorrect — board members also have a personal responsibility to demonstrate the values in their own behaviour."], "ref": "Section 4.1.1"}, {"id": "E10", "section": "4.2", "level": "Understanding", "marks": 1, "scenario": "Bill, Ben and Jane run a digital transformation company called Company X. They all work full-time in the business and sit on the board together. Jill, who is not employed by the company but provides some financial advice on the activities of Company X, is also on the board.", "question": "Which type of board does Company X have?", "options": ["An all-executive board", "A majority executive board", "A majority non-executive board", "A two-tier board"], "answer": 1, "explanations": ["Incorrect — Jill is a non-executive member; the board is not all-executive.", "Correct — three of the four board members are executive (Bill, Ben, Jane), constituting a majority.", "Incorrect — the majority of board members are executives, not non-executives.", "Incorrect — a two-tier board has a separate supervisory board and management board; this is a unitary board structure."], "ref": "Section 4.2.1"}, {"id": "G9", "section": "4.1", "level": "Understanding", "marks": 1, "scenario": null, "question": "Which of the following is MOST likely to appear on a board's schedule of matters reserved for the board?", "options": ["Approving individual staff expense claims above a set threshold.", "Approving the annual budget and major capital expenditure above a defined limit.", "Managing day-to-day supplier relationships and procurement contracts.", "Setting departmental KPIs for individual teams within the organisation."], "answer": 1, "explanations": ["Incorrect — individual expense approvals are an operational management matter, typically delegated to finance teams.", "Correct — approving the annual budget and major capital expenditure is a classic example of a matter reserved for the board, given its strategic and financial significance.", "Incorrect — supplier relationship management is an operational activity delegated to management.", "Incorrect — setting departmental KPIs is a management activity; the board sets strategic objectives, not operational targets."], "ref": "Section 4.1.2"}, {"id": "G10", "section": "4.2", "level": "Understanding", "marks": 1, "scenario": null, "question": "Under most corporate governance codes, which of the following circumstances would MOST LIKELY disqualify a non-executive director from being considered independent?", "options": ["Having previously served as a non-executive director on another unrelated company's board.", "Holding professional qualifications relevant to the company's sector.", "Being the spouse of a significant shareholder of the company.", "Having served on the current board for six years."], "answer": 2, "explanations": ["Incorrect — prior NED experience elsewhere is generally considered positive and does not compromise independence.", "Incorrect — relevant professional expertise is desirable and does not affect independence.", "Correct — family or close personal relationships with significant shareholders constitute a clear conflict of interest and would disqualify a NED from being considered independent under most governance codes.", "Incorrect — while very long tenure (e.g. over nine years) may be scrutinised, six years is generally within the acceptable range for independence."], "ref": "Section 4.2.2"}, {"id": "G11", "section": "4.5", "level": "Understanding", "marks": 1, "scenario": null, "question": "Which of the following BEST describes the purpose of a board evaluation process?", "options": ["To assess the individual performance of executive directors for remuneration purposes.", "To assess the board's collective effectiveness, identify areas for improvement and inform board development.", "To provide external shareholders with a report on management performance.", "To verify that all board members hold the necessary professional qualifications for their role."], "answer": 1, "explanations": ["Incorrect — individual executive performance assessment for remuneration is the role of the remuneration committee.", "Correct — a board evaluation assesses how effectively the board as a whole is operating, identifies areas for development, and informs succession planning and director training.", "Incorrect — while some public companies may disclose board evaluation outcomes, this is not its primary purpose.", "Incorrect — verifying qualifications may be part of appointment checks, but is not the purpose of an ongoing board evaluation."], "ref": "Section 4.5.1"}, {"id": "G12", "section": "4.3", "level": "Knowledge", "marks": 1, "scenario": null, "question": "Which of the following is the PRIMARY function of the nomination committee?", "options": ["To set the remuneration packages for the CEO and senior executives.", "To oversee the external audit process and the integrity of financial reporting.", "To lead the process for board appointments, review board composition and oversee succession planning.", "To review and approve the company's risk appetite and internal control framework."], "answer": 2, "explanations": ["Incorrect — setting executive remuneration is the remuneration committee's function.", "Incorrect — overseeing external audit and financial reporting integrity is the audit committee's function.", "Correct — the nomination committee's primary role is to lead the process for identifying and recommending board candidates, ensure the board has an appropriate balance of skills and experience, and oversee succession planning.", "Incorrect — reviewing risk appetite and internal controls is primarily the audit or risk committee's function."], "ref": "Section 4.3.4"}, {"id": "W13", "section": "5.1", "level": "Application", "marks": 1, "scenario": "Four Winds Turbines Ltd is considering constructing a wind farm high on the North Yorkshire Moors. It has identified a number of risks over a five-year time horizon:\n\n1. Environmental protestors' vandalism – 1/1,000 probability and cost of £25,000.\n2. Insufficient wind to power the turbines – 1/20 probability, with lost revenues of £150,000.\n3. Too much wind, meaning turbines would have to be shut down – 1/40 probability, with lost revenue of £75,000.\n4. Flooding causing electrical damage – 1/10,000 and a cost of £15,000.", "question": "Which of the following risks does the board need to make sure it has considered before it decides to commit to the project?", "options": ["1 and 2 only", "1 and 3 only", "2, 3 and 4 only", "1, 2, 3 and 4"], "answer": 3, "explanations": ["Incorrect — all identified risks should be considered, not just those with the highest probability.", "Incorrect — all identified risks should be considered.", "Incorrect — all identified risks should be considered, including those with lower probability.", "Correct — all identified risks should be considered. Those with higher probability and impact require greater focus on mitigation."], "ref": "Section 5.1.4"}, {"id": "W14", "section": "5.2", "level": "Application", "marks": 1, "scenario": "Silver Star Reinsurance Ltd has an issue in its accounting system, meaning that invoices to non-EU countries are being sent twice. The following functions are present in the company:\n\n1. Accounting\n2. IT\n3. Financial control\n4. Internal audit", "question": "Which of the following BEST states whose responsibility in the organisation it would be to identify the error?", "options": ["1 or 2 only", "1, 2 or 3 only", "1, 2 or 4 only", "1, 2, 3 and 4"], "answer": 3, "explanations": ["Incorrect — although accounting and IT have operational responsibility, other functions also have a role under the three lines of defence.", "Incorrect — internal audit (line 3) also has responsibility to identify such errors through independent review.", "Incorrect — financial control (line 2) also has responsibility to identify and oversee such errors.", "Correct — all four functions are part of the three lines of defence: accounting and IT (first line), financial control (second line), and internal audit (third line)."], "ref": "Section 5.2"}, {"id": "W15", "section": "5.7", "level": "Understanding", "marks": 1, "scenario": "Following a board meeting, the non-executive directors have tasked the executive directors with establishing effective strategic risk evaluation and management processes. The chief executive, finance director, operations director and HR director have set up four separate work streams. Responsibility for the whistleblowing policy has been delegated to the HR director, and the operations director has responsibility for designing personal incentives to encourage risk-taking in line with the organisation's appetite for risk.", "question": "Which of the actions detailed above is the LEAST effective in establishing the required culture?", "options": ["Delaying the communication of the policies for over a month.", "Delegating the development of the whistleblowing policy to the HR director.", "Developing personal incentives to encourage risk-taking in line with the organisation's risk appetite.", "The non-executive directors delegating responsibility."], "answer": 3, "explanations": ["Incorrect — while delay is suboptimal, communicating at all levels that risk management is everyone's job matters more.", "Incorrect — it does not matter which executive director designs the policies, as the executive board will agree them collectively.", "Incorrect — personal incentives that align with risk appetite support a risk-aware culture; empowering people to take risks within a proper framework is best practice.", "Correct — establishing a risk culture starts at the top. The NEDs are an integral part of the board and should not exclude themselves from the entrepreneurial, performance-oriented side of board business by simply delegating this responsibility."], "ref": "Section 5.7"}, {"id": "E11", "section": "5.1", "level": "Application", "marks": 1, "scenario": null, "question": "To ensure an effective approach to risk management in a company, who should be involved in ensuring that risk is managed appropriately?\n\n1. The board\n2. Senior management\n3. All staff\n4. All stakeholders", "options": ["1 only", "1 and 2 only", "1, 2 and 3 only", "1, 2, 3 and 4"], "answer": 2, "explanations": ["Incorrect — for risk management to be effective, the relevant systems and processes must involve everyone in the organisation, not just the board.", "Incorrect — for risk management to be effective, all staff must also be involved.", "Correct — effective risk management must involve the board, senior management and all staff throughout the organisation.", "Incorrect — while stakeholders are relevant to the wider risk landscape, they would not directly be involved in internal risk management processes."], "ref": "Section 5.1.2"}, {"id": "E12", "section": "5.2", "level": "Application", "marks": 1, "scenario": "Allied Technology PLC is expecting significant international growth due to a recent product launch and hopes to double its turnover by the end of the following year. The CEO is considering using the 2015 ISO guide to risk management for SMEs.", "question": "Which of the following benefits would the company potentially get by implementing the code?\n\n1. Alignment of their practices according to an international standard.\n2. Better recognition and management of their risk portfolio.\n3. Clearer identification and avoidance of major risks.", "options": ["1 only", "1 and 2 only", "2 and 3 only", "1, 2 and 3"], "answer": 1, "explanations": ["Incorrect — this ignores the primary objective of better risk recognition and management.", "Correct — the ISO guide enables better alignment with ISO 31000 (1) and helps directors better recognise and manage their risk portfolio (2). Risk avoidance is not the objective.", "Incorrect — risk avoidance is not the aim; better management and understanding of risk is. Statement 3 is therefore incorrect.", "Incorrect — statement 3 (avoidance of major risks) is not an objective of the ISO guide; it focuses on management, not avoidance."], "ref": "Section 5.2"}, {"id": "E13", "section": "5.1", "level": "Understanding", "marks": 1, "scenario": null, "question": "The board of ABC Ltd is considering its role in the company's management of risk. When implementing a risk management framework, which of the following would be generally considered the responsibility of the board rather than senior management?\n\n1. Maintaining and updating the risk register.\n2. Determining risk appetite.\n3. Establishing procedures to manage risk.\n4. Undertaking a robust assessment of the principal risks to the company's business model.", "options": ["1 and 2 only", "1, 2 and 3 only", "1, 2 and 4 only", "2, 3 and 4 only"], "answer": 3, "explanations": ["Incorrect — maintaining and updating the risk register (1) is a management responsibility, not a board responsibility.", "Incorrect — statement 1 is a management responsibility.", "Incorrect — statement 1 is a management responsibility.", "Correct — determining risk appetite (2), establishing risk procedures (3), and undertaking principal risk assessment (4) are board responsibilities. Maintaining and updating the risk register day-to-day (1) is a management responsibility."], "ref": "Sections 5.1.2 and 5.6"}, {"id": "G13", "section": "5.3", "level": "Understanding", "marks": 1, "scenario": null, "question": "Which of the following is an example of REPUTATIONAL RISK?", "options": ["A cyber-attack that directly results in the theft of customer financial data from the company's servers.", "A regulatory investigation into the company's accounting practices.", "A whistleblower publicly disclosing that the company uses exploitative supply-chain labour practices, triggering a consumer boycott.", "A subsidiary company failing to comply with local health and safety regulations."], "answer": 2, "explanations": ["Incorrect — this is primarily a cybercrime/IT risk. While it may have reputational consequences, the primary risk category is cybercrime.", "Incorrect — this is primarily a regulatory/compliance risk, though reputational damage may follow.", "Correct — the public disclosure triggers immediate and direct reputational harm, damaging stakeholder trust and commercial relationships. This is a classic reputational risk scenario.", "Incorrect — non-compliance with local regulations is primarily a legal/compliance risk."], "ref": "Section 5.3.3"}, {"id": "G14", "section": "5.5", "level": "Understanding", "marks": 1, "scenario": null, "question": "Which of the following BEST describes the purpose of a risk register?", "options": ["A legal document filed with the regulator that lists all risks faced by the company.", "A management tool used to record, monitor and manage identified risks, typically showing probability, potential impact and agreed mitigation actions.", "A report presented to shareholders at the AGM summarising all risk decisions taken by the board.", "An insurance schedule that specifies which risks are covered by the company's policies."], "answer": 1, "explanations": ["Incorrect — a risk register is not filed with any regulator; it is an internal management tool.", "Correct — the risk register is the central risk management tool, recording identified risks with their probability, impact, owner and mitigation actions, and enabling ongoing monitoring.", "Incorrect — while boards may report on risks to shareholders, the risk register itself is an internal document.", "Incorrect — the risk register is distinct from insurance schedules; insurance is one possible mitigation tool listed within the register."], "ref": "Section 5.5.2"}, {"id": "G15", "section": "5.9", "level": "Understanding", "marks": 1, "scenario": null, "question": "In the context of board oversight of crisis management, which of the following statements is MOST accurate?", "options": ["Crisis management is solely the responsibility of executive management; the board should not be involved until after a crisis has been resolved.", "The board should have approved a crisis management plan in advance and ensure management has the capability to execute it effectively.", "All crises should be managed by an external specialist firm, with the board kept informed but not directly involved.", "Crisis management plans are only relevant for large, publicly listed companies."], "answer": 1, "explanations": ["Incorrect — the board has a governance responsibility for crisis preparedness; it cannot simply defer until the crisis is resolved.", "Correct — the board should approve crisis management plans as part of its risk governance role and ensure management has the capability to execute them.", "Incorrect — while external specialists may assist, the board retains governance responsibility and cannot fully delegate crisis management.", "Incorrect — crisis management plans are relevant to all organisations regardless of size or listing status."], "ref": "Section 5.9"}, {"id": "W16", "section": "6.2", "level": "Application", "marks": 1, "scenario": "Global Nuclear Energy PLC is considering building a nuclear power plant on the north Queensland coast in Australia and wants to assess the impact on the project's stakeholders.\n\n1. The bank and the syndicate members who fund the project\n2. The Queensland government\n3. The potential workforce in the local community\n4. The Great Barrier Reef environmental lobby group", "question": "Which of the following would be considered to be primary stakeholders?", "options": ["1 and 2 only", "1 and 3 only", "1, 3 and 4 only", "2, 3 and 4 only"], "answer": 1, "explanations": ["Incorrect — the government (2) would be considered a secondary stakeholder.", "Correct — the finance providers (1) are always primary stakeholders. The local community and potential workforce (3) are directly impacted and are primary stakeholders.", "Incorrect — the environmental lobby group (4) is a secondary stakeholder.", "Incorrect — the government (2) and the environmental lobby (4) are secondary stakeholders. Finance providers are always primary."], "ref": "Section 6.3"}, {"id": "W17", "section": "6.3", "level": "Analysis", "marks": 2, "scenario": "Company X, which is based in Country A, imports cheap fashion garments from Country B. The market in Country A for cheap fashion is very competitive and has extremely tight margins. Country B has a reputation for utilising child labour; however, no checks have been undertaken by Company X regarding their supplier in Country B. The contract was awarded purely on the basis of cost.", "question": "Which of the following statements is most appropriate in relation to the scenario above?", "options": ["In a competitive market, it is perfectly acceptable for the board to award the contract purely based on cost.", "As child labour is an acceptable practice in Country B, it is acceptable for the board of Company X to award contracts to suppliers in Country B who utilise this type of labour.", "The board of Company X should extend their basic minimum standards to all those who are involved with the company, either directly or indirectly, even if this increases costs.", "The profitability of Company X is the prime consideration of the board, and this needs to take precedence over any other factor."], "answer": 2, "explanations": ["Incorrect — using a supplier who utilises child labour is unacceptable regardless of competitive pressures.", "Incorrect — child labour is unacceptable even if the practice is legally permitted in the country where it is undertaken.", "Correct — organisations should not be enablers of harmful practices. Directors' duties extend to third parties in the supply chain; minimum standards must apply throughout.", "Incorrect — profit, while important, must not be pursued without due regard to ethical, social and legal considerations."], "ref": "Section 6.2.4"}, {"id": "E14", "section": "6.2", "level": "Application", "marks": 1, "scenario": null, "question": "While managing conflicts of interests of stakeholders, which of the following strategies should a company pursue?", "options": ["Seek to align the needs of primary stakeholders as well as satisfying, where possible, the needs of secondary stakeholders.", "Satisfy the needs of primary stakeholders in preference to those of secondary stakeholders.", "Satisfy the needs of shareholders and manage all other stakeholder groups to achieve this end.", "Satisfy the needs of customers and manage all other stakeholder groups to achieve this end."], "answer": 0, "explanations": ["Correct — stakeholder management is complex; various groups will require different levels of engagement at different times. A company must seek to align primary needs while accommodating secondary stakeholders where possible.", "Incorrect — this is too prescriptive, given the changing relative importance of different stakeholder groups over time.", "Incorrect — although shareholder returns are important, other stakeholder groups' interests can and do take precedence at different times.", "Incorrect — while customers are vital, other stakeholders' needs may take precedence depending on the circumstances."], "ref": "Section 6.3"}, {"id": "G16", "section": "6.1", "level": "Understanding", "marks": 1, "scenario": null, "question": "Which of the following BEST describes the relationship between Corporate Social Responsibility (CSR) and corporate governance?", "options": ["CSR and corporate governance are the same concept and the terms can be used interchangeably.", "CSR is concerned with the organisation's financial obligations to shareholders; governance is about ethical responsibilities.", "Good corporate governance provides the framework within which responsible and ethical behaviour — including CSR — can be embedded and sustained.", "CSR applies only to large publicly listed companies; corporate governance applies to all organisations."], "answer": 2, "explanations": ["Incorrect — CSR and governance are related but distinct concepts. Governance provides the structure; CSR is one dimension of how an organisation behaves responsibly.", "Incorrect — this reverses the concepts. CSR is about broader social/environmental responsibilities; governance encompasses both ethical and structural dimensions.", "Correct — effective corporate governance creates the structures, culture and accountability that allow CSR commitments to be embedded and delivered consistently.", "Incorrect — neither CSR nor corporate governance is limited to listed companies."], "ref": "Section 6.1.1"}, {"id": "G17", "section": "6.3", "level": "Knowledge", "marks": 1, "scenario": null, "question": "Under the UK Bribery Act 2010, which of the following statements is CORRECT?", "options": ["Facilitation payments to foreign officials are permitted as long as they are disclosed in the company's accounts.", "A company is only liable for bribery committed by its own employees, not by third-party agents acting on its behalf.", "The Act creates a strict corporate liability offence of failing to prevent bribery, which can only be defended by demonstrating that adequate anti-bribery procedures were in place.", "The Act applies only to bribery of foreign public officials; domestic commercial bribery is governed by separate legislation."], "answer": 2, "explanations": ["Incorrect — the UK Bribery Act does not permit facilitation payments. All facilitation payments are prohibited.", "Incorrect — an organisation can be liable for bribery committed by associated persons acting on its behalf, including third-party agents.", "Correct — s.7 of the Bribery Act creates a strict corporate liability offence of failing to prevent bribery. The only full defence is showing that adequate procedures were in place.", "Incorrect — the Act covers both domestic and foreign bribery, including commercial bribery between private parties."], "ref": "Section 6.3.5"}, {"id": "G18", "section": "6.3", "level": "Application", "marks": 2, "scenario": "MediaPulse Ltd, a marketing company, uses personal data collected from website visitors to target them with advertisements without their explicit consent. The company's board is unaware of this practice, as it was introduced by the marketing team without board approval. When a customer complaint triggers a regulatory investigation, the board claims they had no knowledge of the data collection practices.", "question": "Which of the following BEST describes the board's position?", "options": ["The board has no liability as the practice was introduced by management without their knowledge or approval.", "The board's claim of ignorance is a complete defence under data protection legislation.", "The board has a governance responsibility to ensure that policies and processes comply with data protection laws, and cannot rely solely on ignorance as a defence.", "Only the members of the marketing team who introduced the practice face personal liability."], "answer": 2, "explanations": ["Incorrect — ignorance of management's actions does not absolve the board. The board is responsible for establishing oversight mechanisms that should have detected this.", "Incorrect — ignorance is not a complete defence; the board is expected to have systems in place to ensure compliance with applicable law.", "Correct — the board has a governance responsibility to establish adequate policies, oversight mechanisms and a culture of compliance. Failure to do so means the board cannot disclaim responsibility by pleading ignorance.", "Incorrect — while team members may face individual liability, this does not insulate the board from its governance responsibilities."], "ref": "Section 6.3.6"}, {"id": "G19", "section": "6.1", "level": "Understanding", "marks": 1, "scenario": null, "question": "A company's board is reviewing its obligations under the Environmental element of ESG. Which of the following would MOST appropriately fall under the 'E' in ESG?", "options": ["Setting executive remuneration linked to long-term performance targets.", "Publishing a modern slavery statement as required by the Modern Slavery Act.", "Implementing a net-zero carbon emissions strategy and disclosing climate-related financial risks in line with TCFD recommendations.", "Establishing a whistleblowing hotline to allow employees to report governance concerns."], "answer": 2, "explanations": ["Incorrect — linking executive pay to long-term performance relates to governance (G) — specifically remuneration governance.", "Incorrect — a modern slavery statement relates to the Social (S) element of ESG, covering human rights and supply chain practices.", "Correct — a net-zero strategy and TCFD-aligned climate risk disclosure are core Environmental (E) obligations, addressing the company's impact on and exposure to environmental/climate risks.", "Incorrect — a whistleblowing policy is a governance (G) mechanism."], "ref": "Section 6.1.2"}, {"id": "G20", "section": "1.1", "level": "Knowledge", "marks": 1, "question": "The word 'governance' derives from the Latin 'gubernare', which originally meant:", "options": ["A. To rule or command", "B. To steer or pilot a ship", "C. To account for finances", "D. To legislate or make laws"], "answer": 1, "explanations": ["Incorrect — 'gubernare' relates to steering, not commanding.", "Correct — 'gubernare' originally referred to steering or piloting a ship, reflecting governance as directing an enterprise.", "Incorrect — accounting is not the origin of the term.", "Incorrect — legislation is not the etymology."], "ref": "Section 1.1"}, {"id": "G21", "section": "1.1", "level": "Understanding", "marks": 1, "question": "Which of the following best distinguishes corporate governance from management?", "options": ["A. Governance focuses on day-to-day operational decisions", "B. Management sets the strategic direction while governance implements it", "C. Governance oversees executive management to ensure the organisation stays on course", "D. Governance and management are interchangeable terms in modern organisations"], "answer": 2, "explanations": ["Incorrect — day-to-day operations are management's domain.", "Incorrect — it is the board that sets direction; management implements.", "Correct — corporate governance is about overseeing management and ensuring the organisation moves in the right direction, not running it operationally.", "Incorrect — they are distinct concepts with different roles."], "ref": "Section 1.1"}, {"id": "G22", "section": "1.1", "level": "Knowledge", "marks": 1, "question": "The 'agency problem' in corporate governance refers to:", "options": ["A. The difficulty of enforcing rules across multiple jurisdictions", "B. Tension arising when those running a company are not its major shareholders", "C. The use of advisory boards instead of formal corporate boards", "D. Conflicts between non-executive and executive directors"], "answer": 1, "explanations": ["Incorrect — cross-jurisdictional enforcement is a different issue.", "Correct — the agency problem (identified by Berle and Means, 1932) describes the tension when professional managers, not major shareholders, run a company, potentially misaligning interests.", "Incorrect — advisory boards are a separate governance topic.", "Incorrect — executive vs non-executive conflicts are distinct from the agency problem."], "ref": "Section 1.1"}, {"id": "G23", "section": "1.1", "level": "Knowledge", "marks": 1, "question": "Which of the following best describes 'poison pills' as used by US companies in the 1980s?", "options": ["A. Mechanisms to attract hostile takeover bids", "B. Protective practices introduced to ward off unwanted takeover bids", "C. Regulatory requirements imposed by the SEC on listed companies", "D. Shareholder agreements that limited board independence"], "answer": 1, "explanations": ["Incorrect — poison pills were defensive, not designed to attract bids.", "Correct — poison pills were protective practices introduced by boards to resist undesirable takeover bids, which insulated management from shareholder pressure.", "Incorrect — they were board-initiated practices, not SEC requirements.", "Incorrect — they were not shareholder agreements."], "ref": "Section 1.1"}, {"id": "G24", "section": "1.1", "level": "Knowledge", "marks": 1, "question": "The first-ever national corporate governance code was:", "options": ["A. The Sarbanes-Oxley Act 2002", "B. The UK Corporate Governance Code 2018", "C. The Cadbury Code 1992", "D. The G20/OECD Principles 1999"], "answer": 2, "explanations": ["Incorrect — SOX is US legislation from 2002, not the first governance code.", "Incorrect — the 2018 UKCGC is a later version.", "Correct — the Cadbury Code, published in 1992, was the first national corporate governance code, introducing 'comply or explain'.", "Incorrect — the OECD Principles came later and are international, not a national code."], "ref": "Section 1.1"}, {"id": "G25", "section": "1.2", "level": "Understanding", "marks": 1, "question": "According to a McKinsey study (Newell and Wilson, 2002), institutional investors stated they would:", "options": ["A. Sell shares in poorly governed companies regardless of financial performance", "B. Pay a premium of up to 40% for well-governed companies in some markets", "C. Require mandatory board reviews before investing in any company", "D. Prioritise ESG factors over governance when making investment decisions"], "answer": 1, "explanations": ["Incorrect — the study focused on premiums paid, not mandatory selling.", "Correct — nearly 80% of institutional investors said they would pay a premium for well-governed companies, ranging from 11% (Canada) to up to 40% (Morocco, Egypt, Russia).", "Incorrect — mandatory board reviews were not part of the study's findings.", "Incorrect — the study focused specifically on governance premiums."], "ref": "Section 1.2"}, {"id": "G26", "section": "1.3", "level": "Application", "marks": 2, "scenario": "A board member has been offered a significant personal benefit by a supplier in return for steering a contract award their way. The board member has not disclosed this to colleagues.", "questi
