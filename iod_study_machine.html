on": "Which of the following correctly identifies the governance failures in this scenario?\n\n1. Breach of the integrity tenet — acting dishonestly for personal gain\n2. Breach of the transparency tenet — failing to disclose relevant information\n3. Breach of the accountability tenet — not being accountable to shareholders\n4. Breach of all three principal tenets of corporate governance", "options": ["A. 1 and 2 only", "B. 1 and 3 only", "C. 2 and 3 only", "D. 4 — all three tenets are breached"], "answer": 3, "explanations": ["Incorrect — while 1 and 2 are both present, 3 (accountability) is also compromised as the board member is not acting in the company's interest and concealing this.", "Incorrect — transparency is also clearly breached by non-disclosure.", "Incorrect — this partially correct but misses that integrity is directly breached by accepting a benefit for personal gain.", "Correct — all three tenets are breached: integrity (acting dishonestly for personal gain), transparency (non-disclosure), and accountability (not acting in the company's or shareholders' interests)."], "ref": "Section 1.3"}, {"id": "G27", "section": "1.4", "level": "Understanding", "marks": 1, "question": "Under the 'comply or explain' approach, if a board decides not to follow a provision of the governance code, it must:", "options": ["A. Obtain shareholder approval before proceeding", "B. Explain to shareholders why it has not complied and what alternative approach it has adopted", "C. Notify the regulator within 30 days of non-compliance", "D. Pass a special resolution at the next general meeting"], "answer": 1, "explanations": ["Incorrect — shareholder approval is not required; explanation is.", "Correct — under 'comply or explain', the board must explain in the annual report why it has not complied and describe any alternative approach adopted.", "Incorrect — there is no 30-day notification requirement under a principles-based code.", "Incorrect — a special resolution is not required for governance code non-compliance."], "ref": "Section 1.4"}, {"id": "G28", "section": "1.4", "level": "Knowledge", "marks": 1, "question": "Which country has adopted a mandatory, rules-based approach to corporate governance, with strict enforcement and no national governance code?", "options": ["A. Germany", "B. Australia", "C. The United States of America", "D. The United Kingdom"], "answer": 2, "explanations": ["Incorrect — Germany uses a principles-based approach with a two-tier board system.", "Incorrect — Australia uses a principles-based approach.", "Correct — the USA uses a mandatory rules-based approach (e.g., Sarbanes-Oxley, Dodd-Frank) with no national corporate governance code.", "Incorrect — the UK uses 'comply and explain' under the UKCGC."], "ref": "Section 1.4"}, {"id": "G29", "section": "1.5", "level": "Understanding", "marks": 1, "question": "In the blockholder model of corporate governance, independent directors primarily exist to:", "options": ["A. Represent the interests of the controlling shareholder", "B. Provide a check and balance on the power of the controlling shareholder", "C. Replace management in times of crisis", "D. Provide a check and balance on management power"], "answer": 1, "explanations": ["Incorrect — independent directors should act in the company's interest, not the controlling shareholder's.", "Correct — in the blockholder model, the primary purpose of independent directors is to provide a check and balance on the power of the controlling (blockholder) shareholder.", "Incorrect — replacing management is not the primary purpose of independent directors.", "Incorrect — this is the purpose in the dispersed shareholder model, not the blockholder model."], "ref": "Section 1.5"}, {"id": "G30", "section": "1.5", "level": "Knowledge", "marks": 1, "question": "Co-determination refers to:", "options": ["A. The process of joint decision-making between the board and shareholders", "B. A system requiring employees to participate as board members", "C. The dual approval required for major corporate transactions", "D. The requirement for both a supervisory and management board"], "answer": 1, "explanations": ["Incorrect — co-determination specifically refers to employee board representation, not general joint decision-making.", "Correct — co-determination is the process by which employees are required to participate as board members, established in law in 12 EU countries plus China.", "Incorrect — dual approval for transactions is a separate governance concept.", "Incorrect — the two-tier board structure exists separately from co-determination, though they often coexist."], "ref": "Section 1.5"}, {"id": "G31", "section": "2.1", "level": "Knowledge", "marks": 1, "question": "Which of the following is a key feature that distinguishes a partnership from a sole trader?", "options": ["A. A partnership has limited liability while a sole trader does not", "B. A partnership requires a minimum of two partners", "C. A partnership must be registered at Companies House", "D. A partnership has separate legal personality"], "answer": 1, "explanations": ["Incorrect — both partnerships and sole traders typically have unlimited liability.", "Correct — the key distinction is that a partnership requires a minimum of two partners, whereas a sole trader is a single individual.", "Incorrect — partnerships generally do not need to register at Companies House.", "Incorrect — in most jurisdictions, partnerships do not have separate legal personality (Scotland is a notable exception)."], "ref": "Section 2.1"}, {"id": "G32", "section": "2.1", "level": "Understanding", "marks": 1, "question": "A public limited company (PLC) differs from a private limited company primarily because:", "options": ["A. A PLC has unlimited liability for its shareholders", "B. A PLC may issue shares to the general public and may be listed on a stock exchange", "C. A PLC is exempt from corporate governance codes", "D. A PLC does not need to file accounts at Companies House"], "answer": 1, "explanations": ["Incorrect — both PLCs and private companies have limited liability for shareholders.", "Correct — a PLC may issue shares to the general public and may quote/trade shares on a stock exchange; private companies cannot make such public offerings.", "Incorrect — listed PLCs are subject to more, not fewer, governance requirements.", "Incorrect — PLCs must file accounts at Companies House."], "ref": "Section 2.1"}, {"id": "G33", "section": "2.1", "level": "Knowledge", "marks": 1, "question": "In common law systems, which of the following is a key characteristic that distinguishes them from civil law systems?", "options": ["A. Everything is permitted unless expressly prohibited by law", "B. Codified statutes are the exclusive source of law", "C. There is less freedom of contract than in civil law systems", "D. Court decisions are not binding on future cases"], "answer": 0, "explanations": ["Correct — a key feature of common law systems is that generally, everything is permitted that is not expressly prohibited by law, allowing greater flexibility.", "Incorrect — this is a feature of civil law systems, not common law.", "Incorrect — common law systems generally have greater freedom of contract.", "Incorrect — in common law systems, judicial decisions (precedent) are binding."], "ref": "Section 2.1"}, {"id": "G34", "section": "2.2", "level": "Knowledge", "marks": 1, "question": "The landmark case Salomon v Salomon & Co Ltd [1897] established the principle that:", "options": ["A. Shareholders are personally liable for company debts", "B. A company has a separate legal entity distinct from its shareholders and directors", "C. Directors can be held personally liable for all company losses", "D. Creditors have priority over shareholders in all circumstances"], "answer": 1, "explanations": ["Incorrect — the case established the opposite: shareholders are not personally liable for company debts.", "Correct — Salomon established the fundamental principle of separate legal entity: a company is a different legal person from its shareholders, even if one person controls it.", "Incorrect — the case clarified that directors are not automatically liable for company debts unless wrongdoing is proven.", "Incorrect — while creditors do take priority in insolvency, this was not the central holding of Salomon."], "ref": "Section 2.2"}, {"id": "G35", "section": "2.2", "level": "Application", "marks": 1, "question": "A sole director who owns 100% of a company's shares uses company funds to buy personal property for their own use. Under the principle of separate legal personality:", "options": ["A. This is permissible as the director effectively owns the company", "B. This could constitute theft from the company, as company property belongs to the company, not its directors", "C. This is acceptable provided a majority shareholder resolution approves it", "D. This only becomes problematic if the company is insolvent"], "answer": 1, "explanations": ["Incorrect — even sole director/100% shareholders cannot treat company property as personal property.", "Correct — under the principle of separate legal entity, company property belongs to the company. Even a sole director who is a 100% shareholder could be found guilty of stealing from their own company.", "Incorrect — a shareholder resolution cannot authorise outright theft of company assets.", "Incorrect — the wrong occurs at the point of misappropriation, not just upon insolvency."], "ref": "Section 2.2"}, {"id": "G36", "section": "2.2", "level": "Understanding", "marks": 1, "question": "In most jurisdictions, a shareholder's liability in a limited company is limited to:", "options": ["A. The total market value of their shares at any given time", "B. The amount of share capital they have agreed to subscribe (nominal value)", "C. Their proportionate share of the company's total liabilities", "D. Nothing — shareholders have no liability whatsoever"], "answer": 1, "explanations": ["Incorrect — liability is limited to the nominal value subscribed, not the market value.", "Correct — limited liability means a shareholder's liability is restricted to the nominal value of shares they agreed to subscribe. Fully paid shares means nil further liability.", "Incorrect — shareholders are not proportionately liable for company liabilities.", "Incorrect — shareholders can be liable for unpaid amounts on partly paid shares."], "ref": "Section 2.2"}, {"id": "G37", "section": "2.3", "level": "Knowledge", "marks": 1, "question": "In the UK, a special resolution at a general meeting typically requires:", "options": ["A. A simple majority (over 50%) of votes cast", "B. Unanimous consent of all shareholders", "C. A super majority (75% or more) of votes cast", "D. Approval from the board of directors in addition to shareholders"], "answer": 2, "explanations": ["Incorrect — a simple majority is sufficient for ordinary resolutions.", "Incorrect — unanimous consent is required for written resolutions of the board, not shareholder special resolutions.", "Correct — a special resolution in the UK generally requires 75% or more of votes cast, used for significant changes such as amending the articles of association.", "Incorrect — special resolutions are a shareholder matter; board approval is separate."], "ref": "Section 2.3"}, {"id": "G38", "section": "2.3", "level": "Knowledge", "marks": 1, "question": "Which of the following matters would typically require a special resolution at a general meeting?", "options": ["A. Appointing or reappointing board members", "B. Receiving the company accounts", "C. Amending the organisation's governing documents (articles of association)", "D. Approving a dividend"], "answer": 2, "explanations": ["Incorrect — appointing board members typically requires only an ordinary resolution.", "Incorrect — receiving accounts requires an ordinary resolution.", "Correct — amending the articles of association is a fundamental change requiring a special resolution (super majority).", "Incorrect — approving dividends requires an ordinary resolution."], "ref": "Section 2.3"}, {"id": "G39", "section": "2.3", "level": "Understanding", "marks": 1, "question": "Shareholder agreements are most commonly used to:", "options": ["A. Replace the company's articles of association", "B. Regulate relationships among shareholders and reserve certain matters from the board", "C. Provide shareholders with unlimited voting rights on all company decisions", "D. Grant shareholders access to confidential board minutes"], "answer": 1, "explanations": ["Incorrect — shareholder agreements supplement but do not replace the articles of association.", "Correct — shareholder agreements regulate relationships between shareholders and are commonly used by venture capitalists and joint venture partners to reserve certain matters (e.g., strategy, board appointments) from the board.", "Incorrect — shareholder agreements typically address specific governance matters, not unlimited voting rights.", "Incorrect — access to board minutes is not a typical purpose of shareholder agreements."], "ref": "Section 2.3"}, {"id": "G40", "section": "3.1", "level": "Knowledge", "marks": 1, "question": "A 'shadow director' is best defined as:", "options": ["A. A director who holds office on a temporary or alternate basis", "B. A person who is not appointed as a director but in accordance with whose instructions the board is accustomed to act", "C. A non-executive director who attends board meetings without voting rights", "D. A corporate entity rather than an individual serving on the board"], "answer": 1, "explanations": ["Incorrect — this describes an alternate director.", "Correct — a shadow director is a person not formally appointed as a director but whose instructions or directions the board is accustomed to follow. Examples include controlling shareholders, spouses or business consultants.", "Incorrect — this is not a defined category of director.", "Incorrect — this describes a corporate director."], "ref": "Section 3.1"}, {"id": "G41", "section": "3.1", "level": "Understanding", "marks": 1, "question": "The concept of 'ostensible authority' in the context of board members means:", "options": ["A. The authority explicitly granted in the articles of association", "B. The authority of a board member as it appears to external third parties", "C. The authority delegated by the board to the managing director", "D. The authority granted to a director by a shareholder resolution"], "answer": 1, "explanations": ["Incorrect — this describes actual or express authority.", "Correct — ostensible (or apparent) authority is the authority a board member appears to have to third parties, who cannot be expected to know the exact limits of their actual authority.", "Incorrect — delegation from board to MD is about actual delegated authority.", "Incorrect — shareholder resolutions grant specific powers, which is different from ostensible authority."], "ref": "Section 3.1"}, {"id": "G42", "section": "3.2", "level": "Knowledge", "marks": 1, "question": "Board members owe a fiduciary duty to the company. Which of the following best describes a fiduciary duty?", "options": ["A. A duty to maximise short-term profits for shareholders", "B. A duty of trust, loyalty, good faith, and acting for the proper purpose in the company's best interests", "C. A duty to comply with all regulatory requirements in the jurisdiction", "D. A duty to report annually to shareholders on company performance"], "answer": 1, "explanations": ["Incorrect — fiduciary duty is about trust and loyalty, not short-term profit maximisation.", "Correct — a fiduciary duty means the board member owes a duty of trust, loyalty and confidentiality, must act in good faith and for the proper purpose in the best interests of the company.", "Incorrect — regulatory compliance is a legal duty, distinct from fiduciary duty.", "Incorrect — annual reporting is a statutory obligation, not a fiduciary duty per se."], "ref": "Section 3.2"}, {"id": "G43", "section": "3.2", "level": "Application", "marks": 2, "scenario": "A board is making a significant acquisition decision. Under the G20/OECD Principles Sub-principle A, which of the following correctly describes the dual duty requirements?", "question": "Which TWO duties must board members exercise when making the acquisition decision?\n\n1. Duty of care — act on a fully informed basis, with due diligence\n2. Duty of loyalty — act in good faith in the best interests of the company and shareholders\n3. Duty of profit — ensure the acquisition maximises short-term shareholder returns\n4. Duty of disclosure — publicly announce the acquisition before the board vote", "options": ["A. 1 and 2", "B. 1 and 3", "C. 2 and 4", "D. 3 and 4"], "answer": 0, "explanations": ["Correct — Sub-principle A requires both the duty of care (acting on a fully informed basis, with due diligence and care) and duty of loyalty (acting in good faith in the best interests of the company and shareholders).", "Incorrect — there is no 'duty of profit' for short-term returns in the G20/OECD Principles.", "Incorrect — the duty of disclosure does not require pre-vote public announcement; it relates to transparency obligations separately.", "Incorrect — neither duty of profit nor pre-vote public disclosure are the correct duties under Sub-principle A."], "ref": "Section 3.2"}, {"id": "G44", "section": "3.2", "level": "Understanding", "marks": 1, "question": "Under the UK Companies Act 2006, when considering any decision, the board must have regard to which of the following in addition to the company's interests?", "options": ["A. The interests of the company's shareholders only", "B. Factors including long-term consequences, employee interests, supplier and customer relationships, environmental impact and high ethical standards", "C. The preferences of the largest institutional investors", "D. The requirements of the UK Corporate Governance Code exclusively"], "answer": 1, "explanations": ["Incorrect — the Act requires consideration beyond shareholders alone.", "Correct — UK Companies Act 2006 section 172 requires directors to have regard to: long-term consequences, employee interests, supplier/customer relationships, community and environmental impact, maintaining a reputation for high ethical standards, and acting fairly between members.", "Incorrect — institutional investor preferences are not a statutory requirement.", "Incorrect — the UKCGC is a governance code; the Companies Act 2006 sets the legal requirement."], "ref": "Section 3.2"}, {"id": "G45", "section": "3.2", "level": "Analysis", "marks": 2, "scenario": "A board member who is also a major shareholder in a competing company has been asked to vote on a strategic initiative that directly competes with that competitor. The board member attends the meeting and votes without disclosing the conflict.", "question": "Which of the following statements best analyses the governance failures present?", "options": ["A. There is no conflict of interest as the board member is acting in both capacities as shareholder and director", "B. The board member has breached the duty to avoid conflicts of interest and the duty to declare interests, potentially invalidating the board decision", "C. The board member has only breached the transparency tenet; the decision itself remains valid", "D. The situation requires a shareholder resolution before any governance failure can be confirmed"], "answer": 1, "explanations": ["Incorrect — being a shareholder in a competitor creates a clear situational conflict of interest.", "Correct — the board member has breached both the duty to avoid conflicts of interest (being a director of a competitor is a listed example of a conflict) and the duty to declare interests. This may invalidate the decision and expose the board member to personal liability.", "Incorrect — the transparency tenet is just one element; the fiduciary duty to avoid conflicts is also directly breached.", "Incorrect — a shareholder resolution is not required to identify a breach; the conflict and non-disclosure are the immediate failures."], "ref": "Section 3.2"}, {"id": "G46", "section": "3.3", "level": "Knowledge", "marks": 1, "question": "Wrongful trading occurs when:", "options": ["A. A director makes a business decision that results in financial loss", "B. A director continues to trade after the point when they knew or ought to have concluded that there was no reasonable prospect of avoiding insolvent liquidation", "C. A director fails to attend board meetings for three consecutive months", "D. A company trades without proper accounting records"], "answer": 1, "explanations": ["Incorrect — a business decision resulting in loss alone does not constitute wrongful trading.", "Correct — wrongful trading occurs when a director continues to trade knowing, or ought to have known, there was no reasonable prospect of avoiding insolvency, yet failed to take every step to minimise losses to creditors.", "Incorrect — non-attendance at meetings may be a governance issue but is not wrongful trading.", "Incorrect — lack of accounting records is a separate statutory offence."], "ref": "Section 3.3"}, {"id": "G47", "section": "3.3", "level": "Knowledge", "marks": 1, "question": "The Disqualification of Directors regime is primarily designed to:", "options": ["A. Prevent former directors from starting new businesses", "B. Protect the public by preventing unfit individuals from acting as directors for a specified period", "C. Compensate creditors for losses suffered during a company's insolvency", "D. Require directors to pass a qualification exam before appointment"], "answer": 1, "explanations": ["Incorrect — disqualification prevents acting as a director but does not prevent starting a business in another capacity.", "Correct — the director disqualification regime protects the public by disqualifying individuals whose conduct makes them unfit to be directors, for a period determined by the court.", "Incorrect — disqualification does not compensate creditors; other insolvency provisions address creditor claims.", "Incorrect — there is no mandatory qualification exam for directors in most jurisdictions."], "ref": "Section 3.3"}, {"id": "G48", "section": "3.4", "level": "Knowledge", "marks": 1, "question": "Which of the following best describes the role of an independent non-executive director?", "options": ["A. A full-time salaried employee involved in the day-to-day running of the business", "B. A part-time director with no relationship with the company outside their directorship, providing objective independent oversight", "C. A director nominated by the largest shareholder to protect that shareholder's investment", "D. A director who chairs the board's audit committee and reports directly to shareholders"], "answer": 1, "explanations": ["Incorrect — this describes an executive director.", "Correct — an independent non-executive director has no relationship with the company beyond their directorship and provides objective, independent oversight, free from the influence of management or controlling shareholders.", "Incorrect — this describes a nominee director; nominee directors may not meet independence criteria.", "Incorrect — while an INED may chair the audit committee, this is not their defining characteristic."], "ref": "Section 3.4"}, {"id": "G49", "section": "3.4", "level": "Understanding", "marks": 1, "question": "Which of the following best describes the primary distinction between the role of the Chair and the Managing Director/CEO?", "options": ["A. The Chair is responsible for day-to-day operations while the CEO sets long-term strategy", "B. The Chair leads the board and ensures its effectiveness; the CEO leads the executive team and manages the organisation", "C. The Chair represents shareholders while the CEO represents employees", "D. The Chair and CEO roles are interchangeable in most governance frameworks"], "answer": 1, "explanations": ["Incorrect — the CEO/MD manages day-to-day operations; the Chair leads the board.", "Correct — the Chair's role is to lead and ensure the effectiveness of the board; the MD/CEO leads the executive team, implements board strategy and manages operations.", "Incorrect — both have broader responsibilities than representing just one stakeholder group.", "Incorrect — good governance practice (and most codes) recommend separating the Chair and CEO roles."], "ref": "Section 3.4"}, {"id": "G50", "section": "4.1", "level": "Knowledge", "marks": 1, "question": "'Matters reserved for the board' refers to:", "options": ["A. Confidential information that cannot be shared with shareholders", "B. A formal schedule of decisions that only the full board can take, not delegated to management", "C. Items on the board agenda that require unanimous approval", "D. Governance policies applicable only to the non-executive members"], "answer": 1, "explanations": ["Incorrect — matters reserved relate to decision-making authority, not confidentiality.", "Correct — matters reserved for the board is a formal schedule of specific decisions that are reserved for the board alone and cannot be delegated to management, ensuring the board retains governance control.", "Incorrect — not all reserved matters require unanimous approval.", "Incorrect — reserved matters apply to the whole board, not just non-executives."], "ref": "Section 4.1"}, {"id": "G51", "section": "4.2", "level": "Knowledge", "marks": 1, "question": "In a two-tier board structure, which of the following best describes the role of the supervisory board?", "options": ["A. It manages the day-to-day operations of the company", "B. It supervises the management board and consists of non-executive members", "C. It sets executive remuneration and reports to shareholders", "D. It replaces the management board in times of crisis"], "answer": 1, "explanations": ["Incorrect — day-to-day operations are the management board's responsibility.", "Correct — in a two-tier system, the supervisory board consists of non-executive members and oversees the management board, which is composed entirely of executives.", "Incorrect — while remuneration oversight may be part of its role, the defining function is supervision of the management board.", "Incorrect — the supervisory board oversees; it does not replace the management board in crisis."], "ref": "Section 4.2"}, {"id": "G52", "section": "4.2", "level": "Understanding", "marks": 1, "question": "Board diversity is important primarily because:", "options": ["A. It ensures all shareholders are represented on the board", "B. A diverse board brings a wider range of perspectives, reduces groupthink and improves decision-making quality", "C. Regulations in all jurisdictions require gender-balanced boards", "D. It reduces the need for independent non-executive directors"], "answer": 1, "explanations": ["Incorrect — board diversity is not about representing all shareholders directly.", "Correct — board diversity brings a broader range of perspectives, experience and challenge, which reduces groupthink and leads to better, more balanced decisions.", "Incorrect — not all jurisdictions have mandatory gender-balance requirements.", "Incorrect — INEDs remain important regardless of board diversity."], "ref": "Section 4.2"}, {"id": "G53", "section": "4.3", "level": "Knowledge", "marks": 1, "question": "The primary purpose of an audit committee is to:", "options": ["A. Approve the company's strategic direction and annual business plan", "B. Oversee financial reporting, internal controls and the external audit process", "C. Set remuneration policy for executive directors", "D. Nominate candidates for board appointment"], "answer": 1, "explanations": ["Incorrect — strategy approval is a full board function.", "Correct — the audit committee's primary purpose is to oversee financial reporting integrity, internal control systems and the relationship with external auditors, acting as a key governance safeguard.", "Incorrect — this is the remuneration committee's role.", "Incorrect — this is the nomination committee's role."], "ref": "Section 4.3"}, {"id": "G54", "section": "4.3", "level": "Knowledge", "marks": 1, "question": "A nomination committee is primarily responsible for:", "options": ["A. Reviewing and approving the company's financial statements", "B. Overseeing the process for identifying, recommending and selecting new board members", "C. Setting the pay and incentive structures for senior management", "D. Monitoring compliance with anti-corruption legislation"], "answer": 1, "explanations": ["Incorrect — reviewing financial statements is the audit committee's domain.", "Correct — the nomination committee leads the formal process for board appointments, ensuring the right skills and experience are on the board and succession planning is in place.", "Incorrect — this is the remuneration committee's function.", "Incorrect — compliance oversight is a broader board and audit committee function."], "ref": "Section 4.3"}, {"id": "G55", "section": "4.4", "level": "Understanding", "marks": 1, "question": "Unconscious bias in board decision-making is best described as:", "options": ["A. Deliberate discrimination based on a board member's personal views", "B. Automatic, unintentional mental shortcuts that can affect judgement without awareness", "C. The tendency of the chair to override individual board members' views", "D. The influence of major shareholders on board decisions"], "answer": 1, "explanations": ["Incorrect — unconscious bias is unintentional, not deliberate discrimination.", "Correct — unconscious bias consists of automatic mental shortcuts (heuristics) that operate below conscious awareness and can distort judgement, leading to poor or unfair decision-making.", "Incorrect — the chair's override is a boardroom dynamics issue, not unconscious bias.", "Incorrect — shareholder influence is a corporate governance issue, distinct from cognitive bias."], "ref": "Section 4.4"}, {"id": "G56", "section": "4.5", "level": "Knowledge", "marks": 1, "question": "Board evaluation (or board review) is considered best practice primarily because:", "options": ["A. It enables shareholders to replace underperforming board members directly", "B. It helps the board identify its strengths, weaknesses and development needs, improving overall effectiveness", "C. It is required annually under the G20/OECD Principles for all listed companies", "D. It provides a mechanism for executives to give feedback on non-executive performance"], "answer": 1, "explanations": ["Incorrect — board evaluation informs development, not direct shareholder replacement.", "Correct — board evaluation identifies areas for improvement in board effectiveness, composition, skills and processes, enabling continuous improvement in governance quality.", "Incorrect — while encouraged, the G20/OECD Principles do not mandate annual board evaluation for all listed companies in all jurisdictions.", "Incorrect — board evaluation typically assesses the board as a whole and individual directors, led by the chair, not executives evaluating non-executives."], "ref": "Section 4.5"}, {"id": "G57", "section": "4.6", "level": "Understanding", "marks": 1, "question": "Board succession planning is important primarily because:", "options": ["A. It ensures that no board member serves for more than three years", "B. It ensures continuity of leadership and that the board maintains the right mix of skills and experience over time", "C. It gives shareholders the right to select new board members", "D. It prevents the chair from appointing allies to the board"], "answer": 1, "explanations": ["Incorrect — term limits are a separate governance tool; succession planning is broader.", "Correct — succession planning ensures leadership continuity and that the board's composition evolves to maintain the right balance of skills, experience and diversity to meet future challenges.", "Incorrect — while shareholders approve appointments, succession planning is a board-led process.", "Incorrect — preventing nepotism is a governance concern, but is not the primary purpose of succession planning."], "ref": "Section 4.6"}, {"id": "G58", "section": "5.1", "level": "Knowledge", "marks": 1, "question": "Risk appetite is best defined as:", "options": ["A. The maximum possible loss an organisation can sustain", "B. The amount and type of risk an organisation is willing to accept in pursuit of its objectives", "C. The residual risk remaining after all controls have been applied", "D. The level of risk that the board delegates to management to manage"], "answer": 1, "explanations": ["Incorrect — maximum possible loss describes risk capacity, not appetite.", "Correct — risk appetite is the amount and type of risk the organisation is willing to accept in pursuit of its strategic objectives, set by the board as a key governance decision.", "Incorrect — residual risk is what remains after controls; risk appetite is the intentional decision on acceptable risk levels.", "Incorrect — risk delegation is a risk management practice, not the definition of risk appetite."], "ref": "Section 5.1"}, {"id": "G59", "section": "5.2", "level": "Knowledge", "marks": 1, "question": "The Three Lines of Defence model in risk management identifies three distinct groups. Which of the following correctly describes the first line?", "options": ["A. The internal audit function", "B. Risk management and compliance functions", "C. Operational management and staff who own and manage risks daily", "D. The board and audit committee"], "answer": 2, "explanations": ["Incorrect — internal audit is the third line of defence.", "Incorrect — risk and compliance functions are the second line of defence.", "Correct — the first line of defence consists of operational management and staff, who own and manage risks as part of their day-to-day activities.", "Incorrect — the board and audit committee provide overall governance and oversight, above all three lines."], "ref": "Section 5.2"}, {"id": "G60", "section": "5.3", "level": "Knowledge", "marks": 1, "question": "Reputational risk is best described as:", "options": ["A. The risk of financial loss resulting from poor investment decisions", "B. The risk that negative publicity or stakeholder perception will damage the organisation's standing", "C. The risk arising from non-compliance with data protection legislation", "D. The risk of physical damage to the organisation's assets"], "answer": 1, "explanations": ["Incorrect — financial loss from investments describes financial or market risk.", "Correct — reputational risk is the risk that negative publicity, perception or stakeholder opinion will damage the organisation's reputation, with knock-on effects on relationships, business and value.", "Incorrect — data protection non-compliance is a compliance risk, which may contribute to reputational risk but is not the same thing.", "Incorrect — physical asset damage is an operational or property risk."], "ref": "Section 5.3"}, {"id": "G61", "section": "5.4", "level": "Understanding", "marks": 1, "question": "Risk tolerance differs from risk appetite in that:", "options": ["A. Risk tolerance is set by management while risk appetite is set by the board", "B. Risk tolerance defines the acceptable variation around the risk appetite, representing the boundaries within which the organisation will operate", "C. Risk tolerance applies only to financial risks while risk appetite applies to all risk categories", "D. Risk tolerance is a regulatory concept while risk appetite is a governance concept"], "answer": 1, "explanations": ["Incorrect — both are set as part of the governance framework, typically with board oversight.", "Correct — risk tolerance defines the acceptable variation around the stated risk appetite, establishing the boundaries within which the organisation operates when pursuing its objectives.", "Incorrect — both concepts apply across all risk categories, not just financial.", "Incorrect — neither is exclusively regulatory or governance; both are risk management concepts."], "ref": "Section 5.4"}, {"id": "G62", "section": "5.5", "level": "Knowledge", "marks": 1, "question": "A risk register is primarily a tool used to:", "options": ["A. Record all losses suffered by the organisation over the past financial year", "B. Document identified risks, their likelihood, potential impact and the controls in place to mitigate them", "C. Report risk information to external regulators", "D. Rank board members by their risk management expertise"], "answer": 1, "explanations": ["Incorrect — a risk register is forward-looking, not a record of past losses.", "Correct — a risk register is a risk management tool that records identified risks, their assessed likelihood and impact, current controls and mitigations, and ownership, enabling systematic oversight.", "Incorrect — while risk registers may inform regulatory reporting, they are primarily an internal management tool.", "Incorrect — risk registers relate to organisational risks, not board member rankings."], "ref": "Section 5.5"}, {"id": "G63", "section": "5.7", "level": "Knowledge", "marks": 1, "question": "Internal audit's primary role in corporate governance is to:", "options": ["A. Prepare the company's annual financial statements", "B. Provide independent assurance to the board that internal controls and risk management systems are operating effectively", "C. Set the organisation's risk appetite and tolerance levels", "D. Replace external auditors for smaller organisations"], "answer": 1, "explanations": ["Incorrect — preparing financial statements is management's responsibility.", "Correct — internal audit provides independent, objective assurance to the board (typically via the audit committee) that internal controls, risk management and governance processes are working effectively.", "Incorrect — setting risk appetite is a board-level responsibility, not internal audit's.", "Incorrect — internal and external audit serve different purposes and are not interchangeable."], "ref": "Section 5.7"}, {"id": "G64", "section": "5.8", "level": "Understanding", "marks": 1, "question": "A risk-aware culture in an organisation is best characterised by:", "options": ["A. All risk decisions being made at board level to ensure accountability", "B. Open communication about risks, where staff at all levels feel able to escalate concerns without fear", "C. Zero tolerance for any risk-taking across all business activities", "D. Risk management being confined to the risk and compliance department"], "answer": 1, "explanations": ["Incorrect — risk-aware cultures empower staff at all levels, not centralise all decisions at board level.", "Correct — a risk-aware culture is one where risk awareness is embedded throughout the organisation, with open communication and a safe environment for escalating concerns.", "Incorrect — zero risk tolerance is neither practical nor consistent with strategic risk-taking; risk appetite involves accepting some risk.", "Incorrect — a risk-aware culture requires risk management to be owned across the organisation, not siloed in one function."], "ref": "Section 5.8"}, {"id": "G65", "section": "5.9", "level": "Knowledge", "marks": 1, "question": "Crisis management planning in an organisation should primarily include:", "options": ["A. A plan to communicate only with shareholders during a crisis", "B. Scenario analysis, horizon scanning, crisis response plans and clear communication protocols", "C. Delegating all crisis decisions to the company secretary", "D. Insurance cover for all foreseeable risk events"], "answer": 1, "explanations": ["Incorrect — crisis communication must reach a broader range of stakeholders, not just shareholders.", "Correct — effective crisis management includes identifying potential crisis scenarios through horizon scanning, preparing response plans and establishing clear communication protocols for different stakeholders.", "Incorrect — crisis management requires board involvement; it cannot be fully delegated to the company secretary.", "Incorrect — insurance is a risk transfer mechanism, not a crisis management plan."], "ref": "Section 5.9"}, {"id": "G66", "section": "6.1", "level": "Knowledge", "marks": 1, "question": "ESG stands for:", "options": ["A. Ethics, Strategy and Governance", "B. Environmental, Social and Governance", "C. Equity, Sustainability and Growth", "D. Economic, Social and Governance"], "answer": 1, "explanations": ["Incorrect — the 'E' and 'S' in ESG relate to environmental and social, not ethics and strategy.", "Correct — ESG stands for Environmental, Social and Governance, representing the three non-financial factors increasingly used by investors to evaluate companies.", "Incorrect — ESG does not stand for Equity, Sustainability and Growth.", "Incorrect — the 'E' in ESG stands for Environmental, not Economic."], "ref": "Section 6.1"}, {"id": "G67", "section": "6.1", "level": "Understanding", "marks": 1, "question": "Some governance experts argue that governance should not be subsumed into ESG because:", "options": ["A. Governance is less important than environmental and social factors", "B. The G in ESG is fundamentally different in nature — it concerns corporate decision-making processes rather than specific outputs like environmental or social impacts", "C. ESG frameworks are only applicable to listed companies, while governance applies to all organisations", "D. Including governance in ESG makes it harder to measure and compare across companies"], "answer": 1, "explanations": ["Incorrect — governance is not considered less important; the concern is that it may be relatively neglected within ESG.", "Correct — critics argue the G is fundamentally different from E and S: governance concerns the processes of decision-making, whereas E and S are about the specific outputs or impacts of those decisions. Including G in ESG risks it being overshadowed by environmental and social concerns.", "Incorrect — while ESG has been largely applied to listed companies, this is not the main argument against including governance in ESG.", "Incorrect — measurement challenges are not the primary argument."], "ref": "Section 6.1"}, {"id": "G68", "section": "6.2", "level": "Understanding", "marks": 1, "question": "Effective stakeholder engagement by the board is important primarily because:", "options": ["A. It replaces the need for regulatory compliance", "B. Understanding and managing stakeholder relationships contributes to the long-term sustainable success of the organisation", "C. It allows the board to avoid accountability to any single stakeholder group", "D. It is legally required in all jurisdictions for all types of organisation"], "answer": 1, "explanations": ["Incorrect — stakeholder engagement complements, not replaces, regulatory compliance.", "Correct — effective stakeholder engagement helps the board understand the needs and expectations of key stakeholders, building trust and legitimacy, which contributes to long-term sustainable success.", "Incorrect — stakeholder engagement increases accountability to multiple stakeholders, not avoid it.", "Incorrect — while some jurisdictions have reporting requirements, stakeholder engagement is not legally mandated in all jurisdictions for all organisations."], "ref": "Section 6.2"}, {"id": "G69", "section": "6.3", "level": "Knowledge", "marks": 1, "question": "The UK Bribery Act 2010 introduced which of the following significant provisions for organisations?", "options": ["A. A requirement for all directors to personally certify anti-corruption compliance", "B. A corporate offence of failing to prevent bribery, with a defence of having adequate procedures in place", "C. A ban on all hospitality and gifts between companies", "D. Mandatory reporting of all anti-corruption incidents to the Serious Fraud Office"], "answer": 1, "explanations": ["Incorrect — personal certification is a feature of US SOX, not the UK Bribery Act.", "Correct — the UK Bribery Act 2010 created a corporate offence of failure to prevent bribery, with the key defence being that the organisation had adequate procedures in place to prevent bribery.", "Incorrect — the Act does not ban all hospitality; it requires that hospitality not be used as a cover for bribery.", "Incorrect — mandatory reporting to the SFO is not a general requirement under the Bribery Act."], "ref": "Section 6.3"}];

function qCardHTML(qs,idx,study){
  const q=qs[idx];const a=ST.ans[idx];const done=a!==undefined;
  const L=['A','B','C','D'];
  let h='<div class="q-card"><div class="q-meta"><span class="badge b-sec">§'+q.section+'</span><span class="badge '+lc(q.level)+'">'+ls(q.level)+'</span><span class="badge '+(q.marks===1?'b-1m':'b-2m')+'">'+q.marks+' mark'+(q.marks>1?'s':'')+'</span><span class="q-num">Q'+(idx+1)+' / '+qs.length+'</span></div>';
  if(q.scenario)h+='<div class="q-scenario">'+nl(q.scenario)+'</div>';
  h+='<div class="q-text">'+nl(q.question)+'</div><div class="options">';
  q.options.forEach(function(opt,i){
    let cls='opt';let ic='';
    if(done){
      if(i===q.answer){cls+=' cor';ic='<span class="opt-i">✓</span>';}
      else if(i===a&&a!==q.answer){cls+=' wrg';ic='<span class="opt-i">✗</span>';}
      cls+=' dis';
    }else{if(i===a)cls+=' sel';}
    h+='<div class="'+cls+'" onclick="selOpt('+idx+','+i+')"><span class="opt-l">'+L[i]+'.</span><span class="opt-t">'+opt+'</span>'+ic+'</div>';
  });
  h+='</div>';
  if(study&&done){
    h+='<div class="ex-box"><div class="ex-hdr">Explanation &mdash; <span style="font-weight:400;color:#999;font-size:.78rem">'+q.ref+'</span></div>';
    q.explanations.forEach(function(ex,i){
      const c=i===q.answer;
      h+='<div class="ex-item '+(c?'ex-c':'ex-w')+'"><span class="ex-tag">'+L[i]+': '+(c?'✓ Correct':'✗ Incorrect')+'</span> — '+ex+'</div>';
    });
    h+='</div>';
  }
  h+='</div>';return h;
}

function dotGrid(qs,study){
  let h='<div class="q-grid">';
  qs.forEach(function(_,i){
    let cls='q-dot';
    if(i===ST.cur)cls+=' cur';
    else if(ST.ans[i]!==undefined){
      if(study)cls+=ST.ans[i]===qs[i].answer?' ok':' bad';
      else cls+=' ans';
    }
    h+='<div class="'+cls+'" onclick="jump('+i+')">'+(i+1)+'</div>';
  });
  return h+'</div>';
}

let _lsOk=null;
function lsAvail(){if(_lsOk!==null)return _lsOk;try{localStorage.setItem('_t','1');localStorage.removeItem('_t');_lsOk=true;}catch(e){_lsOk=false;}return _lsOk;}
function saveStudyProgress(){if(!lsAvail())return;try{localStorage.setItem('iod_study_prog',JSON.stringify({cur:ST.cur,ans:ST.ans}));}catch(e){}}
function loadStudyProgress(){if(!lsAvail())return null;try{const d=JSON.parse(localStorage.getItem('iod_study_prog')||'null');return d;}catch(e){return null;}}
function clearStudyProgress(){if(!lsAvail())return;try{localStorage.removeItem('iod_study_prog');}catch(e){}}

function startStudy(){
  ST.mode='study';ST.sqs=BANK;
  const saved=loadStudyProgress();
  if(saved&&Object.keys(saved.ans||{}).length>0){
    ST.cur=saved.cur||0;ST.ans=saved.ans||{};
  }else{
    ST.cur=0;ST.ans={};
  }
  renderStudy();
}

function restartStudy(){if(confirm('Start again? All study progress will be cleared.')){clearStudyProgress();ST.cur=0;ST.ans={};renderStudy();}}

function renderStudy(){
  const qs=ST.sqs;const tot=qs.length;const done=Object.keys(ST.ans).length;
  saveStudyProgress();
  let h='';
  if(!lsAvail())h+='<div style="background:#fff3cd;color:#7d4e00;border-radius:8px;padding:8px 12px;font-size:.8rem;margin-bottom:8px;">⚠️ Progress cannot be saved — your browser is blocking localStorage on local files. Try opening in Chrome or enabling local storage in Safari settings.</div>';
  h+='<div class="nav-bar"><button class="btn btn-secondary" onclick="goHome()">← Home</button><span style="font-size:.8rem;color:#666">Study &nbsp;··· '+done+' / '+tot+' answered</span><span class="spacer"></span><button class="btn btn-danger" onclick="restartStudy()">↺ Start Again</button></div>';
  h+='<div class="prog-wrap"><div class="prog-bar" style="width:'+Math.round(100*done/tot)+'%"></div></div>';
  h+=dotGrid(qs,true);
  h+=qCardHTML(qs,ST.cur,true);
  h+='<div class="nav-bar" style="margin-top:6px"><button class="btn btn-secondary" onclick="prev()" '+(ST.cur===0?'disabled':'')+'>← Prev</button><span class="spacer"></span><button class="btn btn-primary" onclick="nxt()" '+(ST.cur===tot-1?'disabled':'')+'>Next →</button></div>';
  scr().innerHTML=h;
}

function startExam(){
  clearInterval(ST.timer);
  ST.mode='exam';ST.eqs=pickExam();ST.cur=0;ST.ans={};ST.left=2700;
  ST.timer=setInterval(tick,1000);renderExam();
}

function tick(){
  ST.left--;
  const el=document.getElementById('td');if(el)el.textContent=fmt(ST.left);
  const tb=document.getElementById('tb');
  if(tb){tb.className='timer-box';if(ST.left<=300)tb.className='timer-box dang';else if(ST.left<=600)tb.className='timer-box warn';}
  if(ST.left<=0){clearInterval(ST.timer);submitExam();}
}

function renderExam(){
  const qs=ST.eqs;const tot=qs.length;const done=Object.keys(ST.ans).length;
  let h='<div class="nav-bar"><button class="btn btn-secondary" onclick="exitExam()">← Exit</button><div id="tb" class="timer-box">⏱ <span id="td" class="t-dig">'+fmt(ST.left)+'</span></div><span class="spacer"></span><span style="font-size:.8rem;color:#666">'+done+'/'+tot+'</span><button class="btn btn-success" onclick="confirmSubmit()">Submit</button></div>';
  h+='<div class="prog-wrap"><div class="prog-bar" style="width:'+Math.round(100*done/tot)+'%"></div></div>';
  h+=dotGrid(qs,false);
  h+=qCardHTML(qs,ST.cur,false);
  h+='<div class="nav-bar" style="margin-top:6px"><button class="btn btn-secondary" onclick="prev()" '+(ST.cur===0?'disabled':'')+'>← Prev</button><span class="spacer"></span><button class="btn btn-primary" onclick="nxt()" '+(ST.cur===tot-1?'disabled':'')+'>Next →</button></div>';
  scr().innerHTML=h;
}

function selOpt(idx,i){
  ST.ans[idx]=i;
  if(ST.mode==='study')saveStudyProgress();
  ST.mode==='exam'?renderExam():renderStudy();
}
function jump(i){ST.cur=i;ST.mode==='exam'?renderExam():renderStudy();}
function prev(){if(ST.cur>0){ST.cur--;ST.mode==='exam'?renderExam():renderStudy();}}
function nxt(){const l=ST.mode==='exam'?ST.eqs.length:ST.sqs.length;if(ST.cur<l-1){ST.cur++;ST.mode==='exam'?renderExam():renderStudy();}}

function exitExam(){if(confirm('Exit exam? Progress will be lost.')){clearInterval(ST.timer);goHome();}}
function confirmSubmit(){if(confirm('Submit exam now?'))submitExam();}

function submitExam(){
  clearInterval(ST.timer);
  const qs=ST.eqs;let sc=0,mx=0;
  qs.forEach(function(q,i){mx+=q.marks;if(ST.ans[i]===q.answer)sc+=q.marks;});
  ST.stats.n++;ST.stats.tot+=sc;ST.stats.mx+=mx;saveS();
  renderResults(qs,sc,mx);
}

function renderResults(qs,sc,mx){
  ST.mode='results';
  const pass=sc>=14;const L=['A','B','C','D'];
  let h='<div class="hero"><div class="sc">'+sc+'/'+mx+'</div><div class="vd '+(pass?'vd-p':'vd-f')+'">'+(pass?'✓ PASS':'✗ FAIL')+'</div><div class="hs">'+Math.round(100*sc/mx)+'% &nbsp;·&nbsp; Pass mark: 14/20 (70%)</div></div>';
  h+='<div class="nav-bar"><button class="btn btn-secondary" onclick="goHome()">← Home</button><button class="btn btn-primary" onclick="startExam()">Retake</button></div>';
  h+='<div style="font-size:.85rem;font-weight:600;color:#555;margin:10px 0 8px">Question Review</div>';
  qs.forEach(function(q,i){
    const a=ST.ans[i];const ok=a===q.answer;const sk=a===undefined;
    const cls=sk?'rq skip':ok?'rq ok':'rq bad';
    h+='<div class="'+cls+'"><div class="rq-hd"><span>'+(sk?'⚪ Skipped':ok?'✅ Correct':'❌ Wrong')+'</span><span class="badge b-sec">§'+q.section+'</span><span class="badge '+lc(q.level)+'">'+ls(q.level)+'</span><span class="badge '+(q.marks===1?'b-1m':'b-2m')+'">'+q.marks+'m</span><span style="margin-left:auto;font-weight:700;font-size:.76rem;color:'+(ok?'var(--green)':'var(--red)')+'">'+( ok?'+'+q.marks:'0')+'/'+q.marks+'</span></div>';
    h+='<div style="font-size:.86rem;font-weight:600;color:var(--navy);margin-bottom:7px">'+nl(q.question)+'</div>';
    if(!sk)h+='<div style="font-size:.81rem;margin-bottom:3px">Your answer: <strong>'+L[a]+'. '+q.options[a]+'</strong></div>';
    if(!ok)h+='<div style="font-size:.81rem;margin-bottom:6px;color:var(--green)">Correct: <strong>'+L[q.answer]+'. '+q.options[q.answer]+'</strong></div>';
    h+='<div class="ex-box">';
    q.explanations.forEach(function(ex,ei){
      const c=ei===q.answer;
      h+='<div class="ex-item '+(c?'ex-c':'ex-w')+'" style="margin-bottom:4px"><span class="ex-tag">'+L[ei]+': '+(c?'✓':'✗')+'</span> '+ex+'</div>';
    });
    h+='<div class="ex-ref">'+q.ref+'</div></div></div>';
  });
  scr().innerHTML=h;
}

function goHome(){clearInterval(ST.timer);if(ST.mode==='study')saveStudyProgress();ST.mode='home';renderHome();}
goHome();
</script>
